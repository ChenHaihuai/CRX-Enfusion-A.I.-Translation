  CRX_AIGroupFormationScaleEditorAttribute "{629F0438D1DB6989}" {
   m_UIInfo SCR_EditorAttributeUIInfo "{629F0438E27D77AF}" {
    Name "Formation Scale"
    Description "Set formation scale of selected AI group. Note: If the formation scale is at 1.0 ( default ) selected AI group will automatically adjust their formation scale during combat based on their threat state which may lead to a very large formation offset. Setting it to a lower or higher value than 1.0 like for example 1.1 will prevent selected AI group from adjusting it automatically during combat. Negative value ( - ) will orientate the formation backwards."
   }
