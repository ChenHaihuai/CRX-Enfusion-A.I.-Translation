 Texts {
  "[CRX] 姿勢"
  "選択したAIグループの姿勢を設定します。"
  "立ち"
  "しゃがみ"
  "伏せ"
  "自動"
  "[CRX] フォーメーション"
  "選択したAIグループのフォーメーションを設定します。注意：戦闘中は「戦闘移動タイプ」が「グループ」または「ファイアチーム」に設定されている場合のみ、選択したフォーメーションが使用されます。"
  "V字隊形"
  "横隊"
  "楔形隊形"
  "縦隊"
  "ファイアチーム"
  "ダイヤモンド隊形"
  "左梯形"
  "右梯形"
  "千鳥縦隊"
  "自律"
  "[CRX] フォーメーション間隔"
  "選択したAIグループのフォーメーション間隔を設定します。注意：1.0（デフォルト）の場合、戦闘中に脅威状態に基づいて自動調整されます。1.0以外の値（例：1.1）に設定すると自動調整が無効になります。負の値はフォーメーションの向きを反転させます。"
  "%1 倍率"
  "[CRX] 帰還方式"
  "AIグループの帰還方式を選択します。注意：なし＝バニラ | 常に＝全タスク完了後に必ず元の位置に戻る | 攻撃後＝戦闘参加後のみ戻る | 偵察後＝戦闘なしの偵察完了後のみ戻る。"
  "なし"
  "常に"
  "攻撃後"
  "偵察後"
  "%1 メートル"
  "%1 メートル"
  "%1 秒"
  "%1%"
  "%1 修正値"
  "%1 km/h"
  "%1 ロケット弾閾値"
  "%1% 確率"
  "[CRX] 銃声反応距離"
  "AIグループが銃声に反応できる距離（メートル）を設定します。"
  "[CRX] 消音銃声聴取距離"
  "AIグループが消音銃声を聴取できる距離（メートル）を設定します。"
  "[CRX] 偵察"
  "選択したAIグループの偵察を許可するか設定します。"
  "[CRX] 偵察半径"
  "AIグループが目標地点を偵察する半径（メートル）を設定します。注意：-2＝バニラ偵察半径 | -1＝CRX偵察半径（脅威状態と敵情報に基づく）。"
  "[CRX] 偵察持続時間"
  "AIグループの偵察許可時間（秒）を設定します。注意：-1＝バニラ偵察時間。"
  "[CRX] 偵察時の建物捜索"
  "偵察中にAIグループが建物捜索を行うことを許可するか設定します。"
  "[CRX] 制圧"
  "選択したAIグループの制圧射撃を許可するか設定します。"
  "[CRX] 制圧持続時間"
  "AIグループの制圧射撃許可時間（秒）を設定します。注意：-1＝バニラ制圧時間。"
  "[CRX] 制圧時弾倉消費確率"
  "制圧射撃時のAIグループの弾倉消費確率を設定します。100%＝バニラ | 0%＝制圧時に弾倉を消費しない。"
  "[CRX] 制圧時ロケット弾保持閾値"
  "車両目標用に保持するロケット弾の数を設定します。注意：5に設定すると非車両目標へのロケット発射を完全に防止します。"
  "[CRX] ロケットランチャー使用クールダウン"
  "非車両目標にロケットを使用した後、再び非車両目標にロケットを使用できるまでのクールダウン時間（秒）を設定します。"
  "[CRX] 戦闘モード"
  "AIグループの戦闘モードを設定します。注意：赤＝非常に積極的な突撃行動（赤＋攻撃的移動が最も積極的な組み合わせ）。黄＝積極的だが制圧射撃に基づく移動。白＝遮蔽物間の移動。"
  "赤"
  "黄"
  "緑"
  "白"
  "[CRX] 戦闘移動確率"
  "戦闘中にAIグループが移動できる確率（パーセント）を設定します。"
  "[CRX] 戦闘遮蔽利用確率"
  "戦闘中にAIグループが遮蔽物を利用できる確率（パーセント）を設定します。"
  "[CRX] 戦闘行動タイプ"
  "AIグループの戦闘行動を設定します。重要：塹壕モードは手動で設定しないでください。注意：CQB＝極小ステップで敵に接近。市街戦＝建物内で小ステップ移動。防御＝敵との安全距離を維持。攻撃＝敵に接近突撃可能。"
  "CQB"
  "市街戦"
  "塹壕"
  "デフォルト"
  "防御"
  "攻撃"
  "機械化"
  "[CRX] 戦闘移動タイプ"
  "戦闘中にAIグループが使用する移動タイプを設定します。"
  "グループ"
  "個別"
  "[CRX] 戦闘距離修正値"
  "AIグループの戦闘距離修正値（メートル）を設定します。注意：修正値で近距離・中距離の戦闘範囲を調整します。戦闘範囲はAIの武器タイプで決まります。概算：近距離約50m | 中距離約50-150m。"
  "[CRX] 遮蔽滞在時間修正値"
  "AIグループの遮蔽滞在時間修正値（秒）を設定します。注意：負の値は遮蔽滞在時間を短縮し、新しい遮蔽物の探索を早めます。"
  "[CRX] 次位置移動遅延修正値"
  "AIグループが現在位置から次の位置に移動するまでの遅延修正値（秒）を設定します。注意：負の値＝より速い移動。"
  "[CRX] 遮蔽中の動的遮蔽探索確率"
  "遮蔽中にAIグループが新しい遮蔽物を探す確率を設定します。注意：0%に設定するとAIは非常に静的になり、遮蔽物間の移動を行いません。"
  "[CRX] 姿勢"
  "AIキャラクターの姿勢を設定します。"
  "[CRX] 階級"
  "選択したAIキャラクターの階級を設定します。"
  "二等兵"
  "伍長"
  "軍曹"
  "少尉"
  "大尉"
  "[CRX] 階級タイプ"
  "選択したAIキャラクターの階級タイプを設定します。"
  "CRX"
  "バニラ"
  "[CRX] 再武装タイプ"
  "AIキャラクターの再武装タイプを設定します。注意：なし＝再武装不可 | デフォルト＝敵味方の武器・弾倉 | 陣営＝味方の武器・弾倉のみ | 弾倉＝同型弾倉のみ。"
  "なし（無効）"
  "デフォルト（敵味方の武器・弾倉）"
  "陣営（味方の武器・弾倉のみ）"
  "弾倉（武器タイプ互換の弾倉のみ）"
  "[CRX] 武器構え"
  "AIキャラクターの武器構え状態を設定します。注意：グローバル設定では同期されません。重要！「武器構え > 構え」と「移動タイプ > スプリント」を同時に使用しないでください！戦闘中のアニメーションが乱れる可能性があります。"
  "構え"
  "下げ"
  "[CRX] 移動タイプ"
  "AIキャラクターの移動タイプを設定します。注意：グローバル設定では同期されません。重要！「武器構え > 構え」と「移動タイプ > スプリント」を同時に使用しないでください！"
  "待機"
  "歩行"
  "走行"
  "スプリント"
  "[CRX] 安全時知覚力"
  "AIキャラクターの安全時知覚力を設定します。注意：高い値＝より速く正確な敵検出。待機中に使用されます。バニラ＝1 | CRX＝1。"
  "[CRX] 警戒時知覚力"
  "AIキャラクターの警戒時知覚力を設定します。注意：高い値＝より速い敵検出。敵未発見だが危険を察知している状態で使用。バニラ＝2.5 | CRX＝3。"
  "[CRX] 警報時知覚力"
  "AIキャラクターの警報時知覚力を設定します。注意：高い値＝より速い敵検出。敵の存在を認識している状態で使用。バニラ＝2.5 | CRX＝3。"
  "[CRX] 脅威時知覚力"
  "AIキャラクターの脅威時知覚力を設定します。注意：高い値＝より速い敵検出。戦闘中に使用されます。バニラ＝0.4 | CRX＝3。"
  "[CRX] 知覚修正値"
  "AIキャラクターの知覚修正値を設定します。注意：この修正値は全ての知覚設定に適用されます。"
  "[CRX] 照準精度誤差"
  "AIキャラクターの照準精度誤差を設定・取得します。注意：階級/スキルに基づく実際の値（0.50-2.00）。グローバル設定では同期されません。"
