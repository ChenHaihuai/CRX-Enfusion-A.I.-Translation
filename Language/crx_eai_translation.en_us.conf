 Texts {
  "[CRX] Stance"
  "Set stance of selected AI group."
  "STAND"
  "CROUCH"
  "PRONE"
  "AUTO"
  "[CRX] Formation"
  "Set formation of selected AI group. Note: During combat selected AI group will use selected formation only if \"Combat Movement Type\" was set to \"GROUP\" or \"FIRETEAM\"."
  "Vee"
  "Line"
  "Wedge"
  "Column"
  "Fireteam"
  "Diamond"
  "EchelonLeft"
  "EchelonRight"
  "StaggeredColumn"
  "Autonomous"
  "[CRX] Formation Scale"
  "Set formation scale of selected AI group. Note: If the formation scale is at 1.0 ( default ) selected AI group will automatically adjust their formation scale during combat based on their threat state which may lead to a very large formation offset. Setting it to a lower or higher value than 1.0 like for example 1.1 will prevent selected AI group from adjusting it automatically during combat. Negative value ( - ) will orientate the formation backwards."
  "%1 scale"
  "[CRX] Return To Position Origin Type"
  "Select return to position origin type of selected AI group. Note: Never = Vanilla | Always = SelectedAI group will always return to the position where it came from, after all tasks ( Attacking or Investigating ) have been completed. | Attacking = Selected AI group will return to the position where it came from, after involved in any kind of combat only. | Investigating = Selected AI group will return to their position, where they came from, after a completed investigation without being involved in any kind of combat only."
  "Never"
  "Always"
  "Attacking"
  "Investigating"
  "%1 meters"
  "%1 meter"
  "%1 seconds"
  "%1%"
  "%1 modifier"
  "%1 km/h"
  "%1 rockets threshold"
  "%1% chance"
  "[CRX] Weapon Fired Reaction Distance"
  "Set weapon fire reaction distance in meters within selected AI group should be able to react to weapon fire."
  "[CRX] Suppressed Weapon Fired Audible Distance"
  "Set distance in meters within selected AI group should be able to hear suppressed weapon fire."
  "[CRX] Investigate"
  "Set if selected AI group should be allowed to investigate."
  "[CRX] Investigate Radius"
  "Set radius in meters within selected AI group should be able to investigate their target destination. Note: -2 = Vanilla investigation radius | -1 = CRX investigation radius. ( Determined by threat state and enemy knowledge )"
  "[CRX] Investigate Duration"
  "Set duration in seconds for how long selected AI group should be allowed to investigate. Note: -1 = Vanilla investigation duration."
  "[CRX] Investigate Building Search"
  "Set if selected AI group should be allowed to perform building search during investigation."
  "[CRX] Suppress"
  "Set if selected AI group should be allowed to suppress."
  "[CRX] Suppress Duration"
  "Set duration in seconds for how long selected AI group should be allowed to suppress. Note: -1 = Vanilla suppress duration."
  "[CRX] Suppress Magazine Consumption Chance"
  "Set chance in percent of how selected AI group should consum their magazines while suppressing. 100% = Vanilla | 0% = AI will not consum any magazines while suppressing."
  "[CRX] Suppress Rocket Launcher Ammo Threshold"
  "Set amount of rocket launcher ammo for selected AI character(s) to keep for vehicle targets instead of shooting them at none vehicle targets. Note: To prevent selected AI character(s) from shooting any rockets at none vehicle targets set the threshold to 5."
  "[CRX] Suppress Rocket Launcher Timeout Duration"
  "Set timeout duration in seconds for how long selected AI group should be prevented from using rocket launchers against any none vehicle target after they attacked none vehicle targets with rocket launchers."
  "[CRX] Combat Mode"
  "Set combat mode to be used by selected AI group during combat. Note: Red = Very aggressive move and push behavior. ( Combat mode Red combined with move behavior type Offensive will be the most aggressive move and push combination. ) Yellow = Still aggressive but move behavior is based on suppression. White = Cover to cover movement."
  "Red"
  "Yellow"
  "Green"
  "White"
  "[CRX] Combat Move Chance"
  "Set chance in percent of how selected AI group should be allowed to move during combat."
  "[CRX] Combat Cover Chance"
  "Set chance in percent of how selected AI group should be allowed to use cover during combat."
  "[CRX] Combat Behavior Type"
  "Set combat behavior of how selected AI group should behave during combat. IMPORTANT: Do not set it to Trench by yourself. Note: Cqb = Selected AI group will move in very small steps and very close to their known enemy position. Urban = Selected AI group will move in smaller steps and adjust their combat move behavior, while inside of buildings. Defensive = Selected AI group will always try to keep some safe distance to their enemy. Offensive = Selected AI group will be allowed to move and push very close to their enemy position."
  "Cqb"
  "Urban"
  "Trench"
  "Default"
  "Defensive"
  "Offensive"
  "Mechanized"
  "[CRX] Combat Movement Type"
  "Set movement type to be used by selected AI group during combat."
  "Group"
  "Individual"
  "[CRX] Combat Range Distance Modifier"
  "Set combat range distance modifier in meter for selected AI group. Note: Modify ( lower / increase ) combat ranges ( close / medium ) by set modifier value. Combat ranges are determined by currently used AI weapon type. Example: AI using a sniper rifle or machine gun will use bigger combat ranges than AI using an assault rifle. Approximately combat ranges: Close range: 50m | Medium range: 50 - 150m."
  "[CRX] Combat Stay In Cover Duration Modifier"
  "Set stay in cover duration modifier in seconds for selected AI group. Note: Negative ( - ) will lower the duration of how long selected AI group will stay at their current cover position and start searching for another cover position."
  "[CRX] Combat Move To Next Position Delay Modifier"
  "Set delay modifier in seconds of how long selected AI group should remain at their current position bevor moving on to the next position. Note: Negative ( - ) = faster movement ( re-positioning )."
  "[CRX] Combat In Cover Dynamic Cover Search Chance"
  "Set chance of how selected AI group should be allowed to search for new cover while in cover. Note: Setting it to 0% will make the AI group very static never using cover to cover based movement which in some case is exactly whats prefared."
  "[CRX] Stance"
  "Set AI character stance."
  "[CRX] Rank"
  "Set rank of selected AI character."
  "Private"
  "Corporal"
  "Sergeant"
  "Lieutenant"
  "Captain"
  "[CRX] Rank Type"
  "Set rank type of selected AI character."
  "CRX"
  "Vanilla"
  "[CRX] Rearm Type"
  "Set rearm type of how selected AI character(s) should be allowed to rearm. Note: None = No rearm | Default: Enemy and friendly weapons and magazines | Faction: Friendly weapons and magazines only | Magazines: Magazines of the same original magazine type only."
  "None ( Disabled )"
  "Default ( Weapons and magazines of enemy and friendly )"
  "Faction ( Weapons and magazines of own faction only )"
  "Magazines ( Magazines compatible with weapon type only )"
  "[CRX] Weapon Raised"
  "Set weapon raised of selected AI character(s). Note: Not synchronized with other AI by using global settings override. IMPORTANT! Do NOT use \"Weapon Raised > Raise\" and \"Movement Type > Sprint\" at the same time! It may will mess up the AI move animation during combat. If you don't know what you are doing just leave it at Autonomous."
  "Raise"
  "Lower"
  "[CRX] Movement Type"
  "Set movement type of selected AI character(s). Note: Not synchronized with other AI by using global settings override.  IMPORTANT! Do NOT use \"Weapon Raised > Raise\" and \"Movement Type > Sprint\" at the same time! It may will mess up the AI move animation during combat. If you don't know what you are doing just leave it at Autonomous."
  "Idle"
  "Walk"
  "Run"
  "Sprint"
  "[CRX] Perception Safe"
  "Set perception safe of selected AI character. Note: Higher value = better and faster enemy detection. Perception safe is used by AI character in idle. Vanilla = 1 | CRX = 1."
  "[CRX] Perception Vigilent"
  "Set perception vigilant of selected AI character. Note: Higher value = better and faster enemy detection. Perception vigilant is used by AI character without enemy but already aware of possible danger. Vanilla = 2.5 | CRX = 3."
  "[CRX] Perception Alerted"
  "Set perception alerted of selected AI character. Note: Higher value = better and faster enemy detection. Perception alerted is used by AI characters aware of enemy presence. Vanilla = 2.5 | CRX = 3."
  "[CRX] Perception Threatened"
  "Set perception threatened of selected AI character. Note: Higher value = better and faster enemy detection. Perception threatened is used by AI characters during combat. Vanilla = 0.4 | CRX = 3."
  "[CRX] Perception Modifier"
  "Set perception modifier of selected AI character. Note: Perception modifier will modify all perception settings by given value."
  "[CRX] Aim Accuracy Error"
  "Set and get aim accuracy error for selected AI character(s). Note: This value is the actual currently used aim accuracy error value used by the AI character(s) based on rank/skill in a range from 0.50 - 2.00. Not synchronized with other AI by using global settings override."
  "[CRX] Aim Accuracy Error Modifier"
  "Set aim accuracy error modifier for selected AI character(s). Note: Higher ( + / positive ) value = worse aim accuracy. Base value which will be modified: Vanilla = 1.0 | CRX = Based on AI character rank 0.50 - 2.00."
  "[CRX] Hold Position"
  "Set \"Yes\" to keep selected AI character at their current position. Selected AI character will be able to react to danger events and friendly in aim but will always return to their hold position."
  "[CRX] Hold Position Radius"
  "Select hold position radius in meters within selected AI character should be allowed to move while holding relative to their hold position."
  "[CRX] Hold Position Update"
  "Click to update selected AI character hold position with its current position."
  "Update"
  "[CRX] Flee Chance"
  "Set chance in percent of how selected AI character(s) should be allowed to flee, if heavily overpowered by their enemies. Note: Flee chance above 50% will result in AI character(s) fleeing very fast. 100% will result in AI character(s) fleeing almost instantly, overpowered or not."
  "[CRX] Idle Observer"
  "Set if selected AI character should be allwed to observe ( look around ) while in idle state ( none combat )."
  "[CRX] Flashlight State"
  "Set flashlight state of selected AI character(s)."
  "On"
  "Off"
  "[CRX] Simulation State"
  "Set simulation state of selected AI character(s). Note: If set to \"AUTONOMOUS\" AI simulation will be enabled/disabled automatically by the engine depending on AI character(s) LOD level ( distance to any player or camera )."
  "[CRX] Weapn Fire Mode"
  "Set weapon fire mde for selected AI character."
  "Hold"
  "Single"
  "Burst"
  "Suppressive"
  "[CRX] Force Stay In Vehicle"
  "Force selected AI character(s) to stay in their assigned vehicle(s)."
  "[CRX] Danger Reaction Chance"
  "Set danger reaction chance in percent of how AI should be allowed to react to danger events. Note: Danger events are \"Damage Taken\" or \"Projectile Hit\"."
  "[CRX] Disable Weapon Controls"
  "If set to \"Yes\" selected AI character(s) will not be able to use their weapon."
  "[CRX] Disable Movement Controls"
  "If set to \"Yes\" selected AI character(s) will not be able to move."
  "[CRX] Magazine Consumption Chance"
  "Set chance in % of how selected AI character(s) should consume their magazines. Note: 0% selected AI character(s) will never run out of ammo."
  "[CRX] Attack Reaction Delay Modifier"
  "Set attack reaction delay modifier for selected AI character. Delay of how long selected AI character will need from identifying a target untill actually starts shooting/attacking. Note: 0 = Vanilla attack reaction delay."
  "[CRX] Global settings override"
  "Override \"Global Settings\" based on settings of current selected AI group. Note: ALL = Override global settings based on settings of current selected AI group and apply them to all AI spawning and already present in the world. NEXT = Override global settings based on settings of current selected AI group and apply them with newly spawned AI only. EXCLUDE = Exclude selected AI group from applying ALL override global settings."
  "ALL"
  "NEXT"
  "FACTION"
  "EXCLUDE"
  "[CRX] Speed"
  "Set vehicle speed in km/h of selected vehicle. Note: Default vehicle speed is 50.0 km/h."
  "[CRX] Priority Level"
  "Set AI waypoint priority level, to give specific waypoints higher or lower priority, to be executed. Note: Game Master will set the waypoint priority level to the highest possible value ( 2000.0 ) turning every waypoint using it into a \"Force\" waypoint."
  "Normal"
  "High"
  "[CRX] Vehicle Speed"
  "Set vehicle speed in km/h based on waypoint. Note: -1 = No waypoint vehicle speed adjustment."
  "[CRX] Waypoint On  Detect"
  "[CRX] Waypoint Completion Radius"
  "[CRX] Attack While Moving Chance"
  "Set chance in percent of how the AI group assigned to the waypoint should be allowed to attack their targets during the \"Force Move\" order. Note: Chance between 30 - 50% has been proven to be a good balance between moving and attacking. Chance above 70% may lead to the AI group moving/advancing very slow to their waypoint destination due to attacking very often."
  "[CRX] Global Config Files Settings Override"
  "Choose if settings from the 'Config Files' should be used."
  "[CRX] Global Weapon Fired Reaction Distance"
  "Set global weapon fire reaction distance in meters within AI groups should be able to react to weapon fire."
  "[CRX] Global Suppressed Weapon Fired Audible Distance"
  "Set global distance in meters within AI groups should be able to hear suppressed weapon fire."
  "[CRX] Global Suppress"
  "Set if AI groups should be allowed to suppress globally."
  "[CRX] Global Investigate"
  "Set if AI groups should be allowed to investigate globally."
  "[CRX] Global Combat Mode"
  "Set global combat mode to be used by AI groups during combat. Note: Red = Very aggressive move and push behavior. ( Combat mode Red combined with move behavior type Offensive will be the most aggressive move and push combination. ) Yellow = Still aggressive but move behavior is based on suppression. White = Cover to cover movement."
  "[CRX] Global Rearm Type"
  "Set global rearm type of how AI character(s) should be allowed to rearm. Note: None = No rearm | Default: Enemy and friendly weapons and magazines | Weapons: Friendly weapons and magazines only | Magazines: Magazines of the same original ( weapon/magazine ) type only."
  "[CRX] Global Perception Safe"
  "Set global perception safe of AI characters. Note: Higher value = better and faster enemy detection. Global perception safe is used by AI characters in idle. Vanilla = 1.0 | CRX = 1.0."
  "[CRX] Global Perception Vigilant"
  "Set global perception vigilant of AI characters. Note: Higher value = better and faster enemy detection. Global perception vigilant is used by AI characters after detecting any kind of danger. Vanilla = 2.5 | CRX = 3.0."
  "[CRX] Global Perception Modifier"
  "Set global perception modifier of AI characters. Note: Perception modifier will modify all perception settings by given value."
  "[CRX] Global Aim Accuracy Error Modifier"
  "Set global aim accuracy error modifier for AI character(s). Note: Higher value = worse aim accuracy. Base value where this modifier will be applyed to: Vanilla = 1.0 | CRX = Based on AI character rank 0.50 - 2.00."
  "[CRX] Global Magazine Consumption Chance"
  "Set chance in % of how AI character(s) should consume their magazines. Note: 0% AI character(s) will never run out of ammo."
  "[CRX] Global Combat In Cover Dynamic Cover Search Chance"
  "Set global chance of how A.I. groups should be allowed to search for new cover while in cover. Note: Some may prefared A.I. to stay at a specific cover while being attacked instead of switching to/searching for new cover."
  "[CRX] Global Comms Handler Timeout"
  "Set timout in seconds within AI should be allowed to talk. Note: Value will be randomized ( randomly increased ) by set value."
  "[CRX] Global Weather Conditions Affects AI"
  "Set if weather conditions ( fog/rain ) should affect AI vision/detection. Note: Only heavy weather conditions will affect AI vision/detection like for example fog density has to be at least at a value of 0.7 or above to have a real visual impact on view distance. Still in very early ( beta ) stage."
  "[CRX] Global Low Light Environment Affects AI"
  "Set if low light environment ( nighttime ) should affect AI vision/detection. Still in very early ( beta ) stage."
  "[CRX] Global Low Light Environment Modifier"
  "Set low light environment modifier used to affect AI vision/detection. Note: Higher value = worse vision/detection. Use small ( 0.3 - 0.5 ) steppings only, since they can already be very effective."
  "[CRX] Global Movement Affects AI Aim Accuracy"
  "Set if movement should affect AI aim accuracy. Note: Will affect aim accuracy of AI in moving vehicles as well. Still in very early ( beta ) stage."
  "[CRX] Global Perceived Faction Changes Affects AI"
  "Set if wearing enemy cloths/uniform should affect how AI perceives a player. Vanilla AI feature used by CRX."
  "[CRX] Global settings override"
  "Override \"Global Settings\" based on settings of current selected AI group. Note: ALL = Override global settings based on settings of current selected AI group and apply them to all AI spawning and already present in the world. NEXT = Override global settings based on settings of current selected AI group and apply them with newly spawned AI only. EXCLUDE = Exclude selected AI group from applying ALL override global settings."
