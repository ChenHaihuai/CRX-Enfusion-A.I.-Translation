  "[CRX] Переопределение глобальных настроек"
  "Переопределить \"Глобальные настройки\" на основе текущей группы ИИ. Примечание: ALL = применить ко всем ИИ. NEXT = только к новым. EXCLUDE = исключить группу из переопределения."
