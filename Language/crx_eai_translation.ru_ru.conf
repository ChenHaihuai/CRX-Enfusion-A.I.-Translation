  "[CRX] Шанс реакции на опасность"
  "Установить шанс реакции ИИ на опасные события. Примечание: Опасные события — \"Получение урона\" и \"Попадание снаряда\"."
  "[CRX] Отключить управление оружием"
  "При \"Да\" персонаж ИИ не сможет использовать оружие."
  "[CRX] Отключить управление движением"
  "При \"Да\" персонаж ИИ не сможет двигаться."
  "[CRX] Шанс расхода магазинов"
  "Установить шанс расхода магазинов персонажа ИИ. Примечание: 0% = боеприпасы никогда не закончатся."
  "[CRX] Модификатор задержки атаки"
  "Установить модификатор задержки атаки персонажа ИИ. Задержка от обнаружения цели до начала стрельбы. Примечание: 0 = Ванильная задержка."
  "[CRX] Переопределение глобальных настроек"
  "Переопределить глобальные настройки на основе настроек выбранной группы ИИ. Примечание: ВСЕ = Применить ко всем ИИ. СЛЕДУЮЩИЙ = Только к новым ИИ. ФРАКЦИЯ = Только к своей фракции. ИСКЛЮЧИТЬ = Исключить из переопределения."
