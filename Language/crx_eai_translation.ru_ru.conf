 Texts {
  "[CRX] Стойка"
  "Установить стойку выбранной группы ИИ."
  "СТОЯ"
  "ПРИСЕД"
  "ЛЁЖА"
  "АВТО"
  "[CRX] Построение"
  "Установить построение выбранной группы ИИ. Примечание: В бою группа будет использовать выбранное построение только если \"Тип боевого перемещения\" установлен на \"ГРУППА\" или \"ОТДЕЛЕНИЕ\"."
  "Клин"
  "Линия"
  "Клин"
  "Колонна"
  "Отделение"
  "Ромб"
  "Эшелон влево"
  "Эшелон вправо"
  "Шахматная колонна"
  "Автономный"
  "[CRX] Масштаб построения"
  "Установить масштаб построения выбранной группы ИИ. Примечание: При значении 1.0 (по умолчанию) группа автоматически корректирует масштаб в бою. Значение отличное от 1.0 (например 1.1) отключает автокоррекцию. Отрицательное значение разворачивает построение."
  "%1 масштаб"
  "[CRX] Тип возврата на позицию"
  "Выбрать тип возврата на позицию для группы ИИ. Примечание: Никогда = Ванильное поведение | Всегда = Группа всегда возвращается после выполнения всех задач | Атака = Возврат только после участия в бою | Разведка = Возврат только после разведки без боя."
  "Никогда"
  "Всегда"
  "Атака"
  "Разведка"
  "%1 метров"
  "%1 метр"
  "%1 секунд"
  "%1%"
  "%1 модификатор"
  "%1 км/ч"
  "%1 порог ракет"
  "%1% шанс"
  "[CRX] Дистанция реакции на стрельбу"
  "Установить дистанцию (в метрах), на которой группа ИИ будет реагировать на стрельбу."
  "[CRX] Дистанция слышимости глушителя"
  "Установить дистанцию (в метрах), на которой группа ИИ слышит стрельбу из оружия с глушителем."
  "[CRX] Разведка"
  "Разрешить ли выбранной группе ИИ проводить разведку."
  "[CRX] Радиус разведки"
  "Установить радиус разведки (в метрах) группы ИИ. Примечание: -2 = Ванильный радиус | -1 = CRX радиус (определяется уровнем угрозы и знанием о противнике)."
  "[CRX] Длительность разведки"
  "Установить длительность разведки (в секундах) группы ИИ. Примечание: -1 = Ванильная длительность."
  "[CRX] Обыск зданий при разведке"
  "Разрешить ли группе ИИ обыскивать здания во время разведки."
  "[CRX] Подавление"
  "Разрешить ли выбранной группе ИИ вести подавляющий огонь."
  "[CRX] Длительность подавления"
  "Установить длительность подавления (в секундах) группы ИИ. Примечание: -1 = Ванильная длительность."
  "[CRX] Шанс расхода магазинов при подавлении"
  "Установить шанс расхода магазинов при подавлении. 100% = Ванильное поведение | 0% = Магазины не расходуются при подавлении."
  "[CRX] Порог боеприпасов РПГ при подавлении"
  "Установить количество ракет для сохранения против техники. Примечание: Значение 5 полностью предотвратит стрельбу ракетами по пехоте."
  "[CRX] Таймаут использования РПГ"
  "Установить время (в секундах) запрета использования РПГ по пехоте после атаки пехотных целей ракетами."
  "[CRX] Боевой режим"
  "Установить боевой режим группы ИИ. Примечание: Красный = Очень агрессивное продвижение (Красный + Наступательный = максимальная агрессия). Жёлтый = Агрессивный, но движение основано на подавлении. Белый = Перемещение от укрытия к укрытию."
  "Красный"
  "Жёлтый"
  "Зелёный"
  "Белый"
  "[CRX] Шанс боевого перемещения"
  "Установить шанс (в процентах) перемещения группы ИИ в бою."
  "[CRX] Шанс использования укрытия"
  "Установить шанс (в процентах) использования укрытий группой ИИ в бою."
  "[CRX] Тип боевого поведения"
  "Установить боевое поведение группы ИИ. ВАЖНО: Не устанавливайте режим Окопов вручную. Примечание: Ближний бой = Движение мелкими шагами вплотную к врагу. Городской = Малые шаги в зданиях. Оборонительный = Поддержание безопасной дистанции. Наступательный = Продвижение вплотную к врагу."
  "Ближний бой"
  "Городской"
  "Окопы"
  "По умолчанию"
  "Оборонительный"
  "Наступательный"
  "Механизированный"
  "[CRX] Тип боевого перемещения"
  "Установить тип перемещения группы ИИ в бою."
  "Группа"
  "Индивидуальный"
  "[CRX] Модификатор боевой дистанции"
  "Установить модификатор боевой дистанции (в метрах) группы ИИ. Примечание: Модификатор изменяет ближнюю/среднюю дистанцию боя. Дистанции зависят от типа оружия ИИ. Примерно: Ближняя ~50м | Средняя ~50-150м."
  "[CRX] Модификатор времени в укрытии"
  "Установить модификатор времени в укрытии (в секундах) группы ИИ. Примечание: Отрицательное значение сокращает время в укрытии и ускоряет поиск нового."
  "[CRX] Модификатор задержки перемещения"
  "Установить модификатор задержки (в секундах) перед перемещением на следующую позицию. Примечание: Отрицательное значение = более быстрое перемещение."
  "[CRX] Шанс динамического поиска укрытия"
  "Установить шанс поиска нового укрытия находясь в укрытии. Примечание: 0% сделает группу очень статичной без перемещений между укрытиями."
  "[CRX] Стойка"
  "Установить стойку персонажа ИИ."
  "[CRX] Звание"
  "Установить звание выбранного персонажа ИИ."
  "Рядовой"
  "Капрал"
  "Сержант"
  "Лейтенант"
  "Капитан"
  "[CRX] Тип звания"
  "Установить тип звания выбранного персонажа ИИ."
  "CRX"
  "Ванильный"
  "[CRX] Тип перевооружения"
  "Установить тип перевооружения персонажа ИИ. Примечание: Нет = Без перевооружения | По умолчанию = Оружие и магазины врагов и союзников | Фракция = Только союзное оружие | Магазины = Только совместимые магазины."
  "Нет (Отключено)"
  "По умолчанию (Оружие и магазины врагов и союзников)"
  "Фракция (Только оружие и магазины своей фракции)"
  "Магазины (Только совместимые с типом оружия)"
  "[CRX] Оружие наготове"
  "Установить состояние оружия наготове для персонажа ИИ. Примечание: Не синхронизируется через глобальные настройки. ВАЖНО! Не используйте одновременно \"Оружие наготове > Поднять\" и \"Тип движения > Спринт\"! Это может нарушить анимацию."
  "Поднять"
  "Опустить"
  "[CRX] Тип движения"
  "Установить тип движения персонажа ИИ. Примечание: Не синхронизируется через глобальные настройки. ВАЖНО! Не используйте одновременно \"Оружие наготове > Поднять\" и \"Тип движения > Спринт\"!"
  "Ожидание"
  "Шаг"
  "Бег"
  "Спринт"
  "[CRX] Восприятие (безопасность)"
  "Установить восприятие в безопасности для персонажа ИИ. Примечание: Выше значение = лучшее обнаружение. Используется в режиме ожидания. Ванилла = 1 | CRX = 1."
  "[CRX] Восприятие (бдительность)"
  "Установить бдительное восприятие персонажа ИИ. Примечание: Выше = лучшее обнаружение. Используется без врага, но при осознании опасности. Ванилла = 2.5 | CRX = 3."
  "[CRX] Восприятие (тревога)"
  "Установить тревожное восприятие персонажа ИИ. Примечание: Выше = лучшее обнаружение. Используется при осознании присутствия врага. Ванилла = 2.5 | CRX = 3."
  "[CRX] Восприятие (угроза)"
  "Установить восприятие под угрозой для персонажа ИИ. Примечание: Выше = лучшее обнаружение. Используется в бою. Ванилла = 0.4 | CRX = 3."
  "[CRX] Модификатор восприятия"
  "Установить модификатор восприятия персонажа ИИ. Примечание: Модификатор применяется ко всем настройкам восприятия."
  "[CRX] Ошибка точности прицеливания"
  "Установить/получить ошибку точности прицеливания персонажа ИИ. Примечание: Фактическое значение на основе звания/навыка (0.50-2.00). Не синхронизируется через глобальные настройки."
  "[CRX] Модификатор ошибки прицеливания"
  "Установить модификатор ошибки прицеливания персонажа ИИ. Примечание: Большее положительное значение = хуже точность. Базовое значение: Ванилла = 1.0 | CRX = На основе звания 0.50-2.00."
  "[CRX] Удерживать позицию"
  "Установите \"Да\" чтобы персонаж ИИ удерживал текущую позицию. Персонаж сможет реагировать на опасность, но всегда вернётся на позицию."
  "[CRX] Радиус удержания позиции"
  "Установить радиус (в метрах), в пределах которого персонаж ИИ может перемещаться при удержании позиции."
  "[CRX] Обновить позицию удержания"
  "Нажмите для обновления позиции удержания на текущую позицию персонажа ИИ."
  "Обновить"
  "[CRX] Шанс бегства"
  "Установить шанс бегства персонажа ИИ при подавлении противником. Примечание: Выше 50% = очень быстрое бегство. 100% = почти мгновенное бегство."
  "[CRX] Наблюдение в ожидании"
  "Разрешить ли персонажу ИИ наблюдать (осматриваться) в режиме ожидания (вне боя)."
  "[CRX] Состояние фонарика"
  "Установить состояние фонарика персонажа ИИ."
  "Вкл"
  "Выкл"
