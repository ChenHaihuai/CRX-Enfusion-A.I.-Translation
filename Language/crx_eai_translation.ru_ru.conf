  "[CRX] Глобальный боевой режим"
  "Установить глобальный боевой режим для групп ИИ. Примечание: Красный = очень агрессивное продвижение. Жёлтый = агрессивный, но основан на подавлении. Белый = перемещение от укрытия к укрытию."
  "[CRX] Глобальный тип перевооружения"
  "Установить глобальный тип перевооружения ИИ. Примечание: Нет = без перевооружения | По умолчанию: вражеское и дружественное оружие | Оружие: только дружественное | Магазины: только совместимые."
  "[CRX] Глобальное восприятие (безопасное)"
  "Установить глобальное безопасное восприятие ИИ. Примечание: выше = лучшее обнаружение. Используется в режиме ожидания. Ванила = 1.0 | CRX = 1.0."
  "[CRX] Глобальное восприятие (бдительное)"
  "Установить глобальное бдительное восприятие ИИ. Примечание: выше = лучшее обнаружение. Используется после обнаружения опасности. Ванила = 2.5 | CRX = 3.0."
  "[CRX] Глобальный модификатор восприятия"
  "Установить глобальный модификатор восприятия ИИ. Примечание: модификатор изменяет все настройки восприятия на указанное значение."
  "[CRX] Глобальный модификатор ошибки точности прицеливания"
  "Установить глобальный модификатор ошибки прицеливания ИИ. Примечание: выше = хуже точность. Базовое значение: Ванила = 1.0 | CRX = по рангу ИИ 0.50 - 2.00."
  "[CRX] Глобальный шанс расхода магазинов"
  "Установить шанс расхода магазинов ИИ. Примечание: при 0% ИИ никогда не израсходует боеприпасы."
  "[CRX] Глобальный шанс поиска нового укрытия в бою"
  "Установить глобальный шанс поиска нового укрытия группами ИИ. Примечание: некоторые предпочитают, чтобы ИИ оставался в укрытии, а не искал новое."
  "[CRX] Глобальный тайм-аут обработчика связи"
  "Установить тайм-аут (в секундах) для общения ИИ. Примечание: значение будет случайно увеличено."
  "[CRX] Глобальное влияние погодных условий на ИИ"
  "Установить, влияют ли погодные условия (туман/дождь) на зрение/обнаружение ИИ. Примечание: только сильная погода влияет, например плотность тумана от 0.7. Ранняя (бета) стадия."
  "[CRX] Глобальное влияние слабого освещения на ИИ"
  "Установить, влияет ли слабое освещение (ночь) на зрение/обнаружение ИИ. Ранняя (бета) стадия."
  "[CRX] Глобальный модификатор слабого освещения"
  "Установить модификатор слабого освещения для зрения/обнаружения ИИ. Примечание: выше = хуже зрение. Используйте малые шаги (0.3 - 0.5)."
  "[CRX] Глобальное влияние движения на точность ИИ"
  "Установить, влияет ли движение на точность прицеливания ИИ. Примечание: также влияет на ИИ в движущихся транспортных средствах. Ранняя (бета) стадия."
  "[CRX] Глобальное влияние смены воспринимаемой фракции на ИИ"
