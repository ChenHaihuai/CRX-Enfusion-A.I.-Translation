  "Установить состояние симуляции персонажа ИИ. Примечание: При \"АВТОНОМНОМ\" режиме движок автоматически управляет симуляцией на основе LOD (расстояния до игрока)."
  "[CRX] Режим стрельбы"
  "Установить режим стрельбы персонажа ИИ."
