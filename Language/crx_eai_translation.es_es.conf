 Texts {
  "[CRX] Postura"
  "Establecer la postura del grupo de IA seleccionado."
  "DE PIE"
  "AGACHADO"
  "CUERPO A TIERRA"
  "AUTO"
  "[CRX] Formación"
  "Establecer la formación del grupo de IA seleccionado. Nota: Durante el combate, la formación seleccionada solo se usará si el \"Tipo de movimiento de combate\" está configurado en \"GRUPO\" o \"EQUIPO DE FUEGO\"."
  "V"
  "Línea"
  "Cuña"
  "Columna"
  "Equipo de fuego"
  "Diamante"
  "Escalón izquierdo"
  "Escalón derecho"
  "Columna escalonada"
  "Autónomo"
  "[CRX] Escala de formación"
  "Establecer la escala de formación del grupo de IA seleccionado. Nota: Con 1.0 (predeterminado), el grupo ajusta automáticamente la escala en combate. Un valor diferente de 1.0 (ej: 1.1) desactiva el ajuste automático. Los valores negativos invierten la orientación."
  "%1 escala"
  "[CRX] Tipo de retorno a posición"
  "Seleccionar el tipo de retorno a posición del grupo de IA. Nota: Nunca = Vanilla | Siempre = Retorno tras completar todas las tareas | Atacando = Retorno solo tras combate | Investigando = Retorno solo tras investigación sin combate."
  "Nunca"
  "Siempre"
  "Atacando"
  "Investigando"
  "%1 metros"
  "%1 metro"
  "%1 segundos"
  "%1%"
  "%1 modificador"
  "%1 km/h"
  "%1 umbral de cohetes"
  "%1% probabilidad"
  "[CRX] Distancia de reacción a disparos"
  "Establecer la distancia (en metros) a la que el grupo de IA reacciona a los disparos."
  "[CRX] Distancia audible de armas suprimidas"
  "Establecer la distancia (en metros) a la que el grupo de IA puede oír disparos suprimidos."
  "[CRX] Investigar"
  "Establecer si el grupo de IA seleccionado puede investigar."
  "[CRX] Radio de investigación"
  "Establecer el radio de investigación (en metros) del grupo de IA. Nota: -2 = Radio vanilla | -1 = Radio CRX (determinado por estado de amenaza y conocimiento enemigo)."
  "[CRX] Duración de investigación"
  "Establecer la duración de investigación (en segundos) del grupo de IA. Nota: -1 = Duración vanilla."
  "[CRX] Búsqueda de edificios en investigación"
  "Establecer si el grupo de IA puede buscar en edificios durante la investigación."
  "[CRX] Supresión"
  "Establecer si el grupo de IA seleccionado puede realizar supresión."
  "[CRX] Duración de supresión"
  "Establecer la duración de supresión (en segundos) del grupo de IA. Nota: -1 = Duración vanilla."
  "[CRX] Probabilidad de consumo de cargadores en supresión"
  "Establecer la probabilidad de consumo de cargadores en supresión. 100% = Vanilla | 0% = Sin consumo en supresión."
  "[CRX] Umbral de munición de lanzacohetes en supresión"
  "Establecer la cantidad de cohetes a reservar para vehículos. Nota: 5 previene completamente el disparo de cohetes contra objetivos no vehiculares."
  "[CRX] Tiempo de espera del lanzacohetes"
  "Establecer el tiempo de espera (en segundos) para impedir el uso de lanzacohetes contra objetivos no vehiculares tras un ataque similar."
  "[CRX] Modo de combate"
  "Establecer el modo de combate del grupo de IA. Nota: Rojo = Comportamiento muy agresivo (Rojo + Ofensivo = combinación más agresiva). Amarillo = Agresivo pero movimiento basado en supresión. Blanco = Movimiento de cobertura a cobertura."
  "Rojo"
  "Amarillo"
  "Verde"
  "Blanco"
  "[CRX] Probabilidad de movimiento en combate"
  "Establecer la probabilidad (en porcentaje) de movimiento del grupo de IA en combate."
  "[CRX] Probabilidad de uso de cobertura"
  "Establecer la probabilidad (en porcentaje) de uso de cobertura del grupo de IA en combate."
  "[CRX] Tipo de comportamiento de combate"
  "Establecer el comportamiento de combate del grupo de IA. IMPORTANTE: No configurar en Trinchera manualmente. Nota: CQB = Pasos muy pequeños cerca del enemigo. Urbano = Pasos pequeños en edificios. Defensivo = Mantener distancia segura. Ofensivo = Avance cercano al enemigo."
  "CQB"
  "Urbano"
  "Trinchera"
  "Predeterminado"
  "Defensivo"
  "Ofensivo"
  "Mecanizado"
  "[CRX] Tipo de movimiento de combate"
  "Establecer el tipo de movimiento del grupo de IA en combate."
  "Grupo"
  "Individual"
  "[CRX] Modificador de distancia de combate"
  "Establecer el modificador de distancia de combate (en metros) del grupo de IA. Nota: Modifica los rangos de combate (corto/medio). Los rangos dependen del tipo de arma. Aproximadamente: Corto ~50m | Medio ~50-150m."
  "[CRX] Modificador de duración en cobertura"
  "Establecer el modificador de duración en cobertura (en segundos) del grupo de IA. Nota: Los valores negativos reducen el tiempo en cobertura y aceleran la búsqueda de nueva posición."
  "[CRX] Modificador de retraso de movimiento"
  "Establecer el modificador de retraso (en segundos) antes de moverse a la siguiente posición. Nota: Valor negativo = movimiento más rápido."
  "[CRX] Probabilidad de búsqueda dinámica de cobertura"
  "Establecer la probabilidad de búsqueda de nueva cobertura estando en cobertura. Nota: 0% hace al grupo muy estático sin movimiento de cobertura a cobertura."
  "[CRX] Postura"
  "Establecer la postura del personaje de IA."
  "[CRX] Rango"
  "Establecer el rango del personaje de IA seleccionado."
  "Soldado"
  "Cabo"
  "Sargento"
  "Teniente"
  "Capitán"
  "[CRX] Tipo de rango"
  "Establecer el tipo de rango del personaje de IA seleccionado."
  "CRX"
  "Vanilla"
  "[CRX] Tipo de rearme"
  "Establecer el tipo de rearme del personaje de IA. Nota: Ninguno = Sin rearme | Predeterminado = Armas y cargadores enemigos y aliados | Facción = Solo armas aliadas | Cargadores = Solo cargadores del mismo tipo."
  "Ninguno (Desactivado)"
  "Predeterminado (Armas y cargadores enemigos y aliados)"
  "Facción (Solo armas y cargadores de la propia facción)"
  "Cargadores (Solo compatibles con el tipo de arma)"
  "[CRX] Arma levantada"
  "Establecer el estado de arma levantada del personaje de IA. Nota: No se sincroniza con configuraciones globales. ¡IMPORTANTE! ¡No use simultáneamente \"Arma levantada > Levantar\" y \"Tipo de movimiento > Sprint\"! Puede causar problemas de animación."
  "Levantar"
  "Bajar"
  "[CRX] Tipo de movimiento"
  "Establecer el tipo de movimiento del personaje de IA. Nota: No se sincroniza con configuraciones globales. ¡IMPORTANTE! ¡No use simultáneamente \"Arma levantada > Levantar\" y \"Tipo de movimiento > Sprint\"!"
  "Inactivo"
  "Caminar"
  "Correr"
  "Sprint"
  "[CRX] Percepción segura"
  "Establecer la percepción segura del personaje de IA. Nota: Mayor valor = mejor detección. Usada en reposo. Vanilla = 1 | CRX = 1."
  "[CRX] Percepción vigilante"
  "Establecer la percepción vigilante del personaje de IA. Nota: Mayor valor = mejor detección. Usada sin enemigo pero consciente del peligro. Vanilla = 2.5 | CRX = 3."
  "[CRX] Percepción en alerta"
  "Establecer la percepción en alerta del personaje de IA. Nota: Mayor valor = mejor detección. Usada cuando se detecta al enemigo. Vanilla = 2.5 | CRX = 3."
  "[CRX] Percepción amenazada"
  "Establecer la percepción amenazada del personaje de IA. Nota: Mayor valor = mejor detección. Usada en combate. Vanilla = 0.4 | CRX = 3."
  "[CRX] Modificador de percepción"
  "Establecer el modificador de percepción del personaje de IA. Nota: El modificador se aplica a todos los ajustes de percepción."
  "[CRX] Error de precisión de puntería"
  "Establecer/obtener el error de precisión de puntería del personaje de IA. Nota: Valor real basado en rango/habilidad (0.50-2.00). No sincronizado con configuraciones globales."
  "[CRX] Modificador de error de puntería"
  "Establecer el modificador de error de puntería del personaje de IA. Nota: Mayor valor positivo = peor precisión. Valor base: Vanilla = 1.0 | CRX = Basado en rango 0.50-2.00."
  "[CRX] Mantener posición"
  "Establecer \"Sí\" para mantener al personaje de IA en su posición actual. Podrá reaccionar a peligros pero siempre volverá a su posición."
  "[CRX] Radio de mantenimiento de posición"
  "Establecer el radio (en metros) dentro del cual el personaje de IA puede moverse mientras mantiene posición."
  "[CRX] Actualizar posición"
  "Haga clic para actualizar la posición de mantenimiento con la posición actual."
  "Actualizar"
  "[CRX] Probabilidad de huida"
  "Establecer la probabilidad de huida del personaje de IA ante enemigos superiores. Nota: Más del 50% = huida muy rápida. 100% = huida casi instantánea."
  "[CRX] Observador inactivo"
  "Establecer si el personaje de IA puede observar (mirar alrededor) en estado inactivo (fuera de combate)."
  "[CRX] Estado de la linterna"
  "Establecer el estado de la linterna del personaje de IA."
  "Encendido"
  "Apagado"
  "[CRX] Estado de simulación"
  "Establecer el estado de simulación del personaje de IA. Nota: En modo \"AUTÓNOMO\", el motor gestiona automáticamente la simulación según el LOD (distancia al jugador)."
  "[CRX] Modo de disparo"
  "Establecer el modo de disparo del personaje de IA."
  "Retener"
  "Semiautomático"
  "Ráfaga"
  "Supresivo"
  "[CRX] Forzar permanencia en vehículo"
  "Forzar al personaje de IA a permanecer en su vehículo asignado."
  "[CRX] Probabilidad de reacción al peligro"
  "Establecer la probabilidad de reacción a eventos de peligro. Nota: Los eventos son \"Daño recibido\" e \"Impacto de proyectil\"."
  "[CRX] Desactivar controles de arma"
  "Si es \"Sí\", el personaje de IA no podrá usar su arma."
  "[CRX] Desactivar controles de movimiento"
  "Si es \"Sí\", el personaje de IA no podrá moverse."
  "[CRX] Probabilidad de consumo de cargadores"
  "Establecer la probabilidad de consumo de cargadores del personaje de IA. Nota: 0% = munición infinita."
  "[CRX] Modificador de retraso de reacción de ataque"
  "Establecer el modificador de retraso de ataque del personaje de IA. Retraso desde la identificación hasta el disparo. Nota: 0 = Retraso vanilla."
  "[CRX] Anulación de configuraciones globales"
  "Anular configuraciones globales basadas en el grupo de IA seleccionado. Nota: TODOS = Aplicar a todos los IA. SIGUIENTE = Solo nuevos IA. FACCIÓN = Solo misma facción. EXCLUIR = Excluir de la anulación."
  "TODOS"
  "SIGUIENTE"
  "FACCIÓN"
  "EXCLUIR"
  "[CRX] Velocidad"
  "Establecer la velocidad del vehículo (km/h). Nota: Velocidad predeterminada 50.0 km/h."
  "[CRX] Nivel de prioridad"
