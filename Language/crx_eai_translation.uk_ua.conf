  "Встановити швидкість техніки (км/год) на основі точки маршруту. Примітка: -1 = Без коригування швидкості."
  "[CRX] Точка при виявленні"
  "[CRX] Радіус завершення точки маршруту"
  "[CRX] Шанс атаки під час руху"
  "Встановити шанс атаки групи ШІ під час наказу \"Примусовий рух\". Примітка: 30-50% — хороший баланс. Понад 70% може сильно уповільнити рух."
  "[CRX] Глобальне перевизначення налаштувань конфігураційних файлів"
  "Оберіть, чи використовувати налаштування з 'Конфігураційних файлів'."
  "[CRX] Глобальна відстань реакції на постріли"
  "Встановити глобальну відстань реакції груп ШІ на стрільбу (у метрах)."
  "[CRX] Глобальна відстань чутності пострілів із глушником"
  "Встановити глобальну відстань (у метрах), на якій групи ШІ можуть чути постріли з глушником."
  "[CRX] Глобальне придушення"
  "Встановити, чи дозволено групам ШІ глобально вести вогонь на придушення."
  "[CRX] Глобальне розслідування"
  "Встановити, чи дозволено групам ШІ глобально проводити розслідування."
  "[CRX] Глобальний бойовий режим"
  "Встановити глобальний бойовий режим груп ШІ. Примітка: Червоний = дуже агресивний. Жовтий = агресивний, але на основі придушення. Білий = рух від укриття до укриття."
  "[CRX] Глобальний тип переозброєння"
  "Встановити глобальний тип переозброєння ШІ. Примітка: Немає = без переозброєння | За замовчуванням: ворожа та союзна зброя | Зброя: лише союзна | Магазини: лише того ж типу."
  "[CRX] Глобальне безпечне сприйняття"
  "Встановити глобальне безпечне сприйняття ШІ. Примітка: вище = краще виявлення. Використовується у стані очікування. Ванільне = 1.0 | CRX = 1.0."
  "[CRX] Глобальне пильне сприйняття"
  "Встановити глобальне пильне сприйняття ШІ. Примітка: вище = краще виявлення. Використовується після виявлення небезпеки. Ванільне = 2.5 | CRX = 3.0."
  "[CRX] Глобальний модифікатор сприйняття"
  "Встановити глобальний модифікатор сприйняття ШІ. Примітка: модифікатор змінює всі налаштування сприйняття."
  "[CRX] Глобальний модифікатор похибки точності прицілювання"
  "Встановити глобальний модифікатор похибки прицілювання ШІ. Примітка: вище = гірша точність. Базове значення: Ванільне = 1.0 | CRX = за рангом 0.50 - 2.00."
  "[CRX] Глобальний шанс витрати магазинів"
  "Встановити шанс витрати магазинів ШІ. Примітка: при 0% ШІ ніколи не вичерпає боєприпаси."
  "[CRX] Глобальний шанс динамічного пошуку укриття в бою"
  "Встановити глобальний шанс пошуку нового укриття групами ШІ. Примітка: деякі віддають перевагу тому, щоб ШІ залишався у конкретному укритті."
  "[CRX] Глобальний тайм-аут обробника зв'язку"
  "Встановити тайм-аут (у секундах) спілкування ШІ. Примітка: значення буде випадково збільшено."
  "[CRX] Глобальні погодні умови впливають на ШІ"
  "Встановити, чи впливають погодні умови (туман/дощ) на зір/виявлення ШІ. Примітка: лише важкі умови мають вплив. Рання (бета) стадія."
  "[CRX] Глобальне середовище слабкого освітлення впливає на ШІ"
  "Встановити, чи впливає слабке освітлення (ніч) на зір/виявлення ШІ. Рання (бета) стадія."
  "[CRX] Глобальний модифікатор середовища слабкого освітлення"
  "Встановити модифікатор слабкого освітлення для зору/виявлення ШІ. Примітка: вище = гірший зір. Використовуйте малі кроки (0.3 - 0.5)."
  "[CRX] Глобальний рух впливає на точність прицілювання ШІ"
  "Встановити, чи впливає рух на точність прицілювання ШІ. Примітка: також впливає на ШІ у рухомих транспортних засобах. Рання (бета) стадія."
  "[CRX] Глобальні зміни сприйнятої фракції впливають на ШІ"
  "Встановити, чи впливає носіння ворожого одягу/форми на сприйняття ШІ. Ванільна функція ШІ, яку використовує CRX."
  "[CRX] Перевизначення глобальних налаштувань"
  "Перевизначити \"Глобальні налаштування\" на основі обраної групи ШІ. Примітка: ALL = застосувати до всіх. NEXT = лише нові ШІ. EXCLUDE = виключити групу."
  "Натисніть, щоб перевизначити глобальні налаштування та застосувати до всіх ШІ."
  "Натисніть, щоб перевизначити глобальні налаштування та застосувати лише до нових ШІ."
  "Натисніть, щоб перевизначити глобальні налаштування за фракцією та застосувати лише до ШІ тієї ж фракції."
  "Натисніть, щоб виключити обрану групу ШІ з усіх перевизначень глобальних налаштувань."
