 Texts {
  "[CRX] Стійка"
  "Встановити стійку вибраної групи ШІ."
  "СТОЯЧИ"
  "ПРИСІВШИ"
  "ЛЕЖАЧИ"
  "АВТО"
  "[CRX] Формація"
  "Встановити формацію вибраної групи ШІ. Примітка: У бою обрана формація використовуватиметься лише якщо \"Тип бойового руху\" встановлено на \"ГРУПА\" або \"ВОГНЕВА ГРУПА\"."
  "V-подібний"
  "Лінія"
  "Клин"
  "Колона"
  "Вогнева група"
  "Ромб"
  "Ешелон ліворуч"
  "Ешелон праворуч"
  "Шахова колона"
  "Автономний"
  "[CRX] Масштаб формації"
  "Встановити масштаб формації вибраної групи ШІ. Примітка: При 1.0 (за замовчуванням) група автоматично коригує масштаб у бою. Значення відмінне від 1.0 (наприклад 1.1) вимикає автокорекцію. Від'ємне значення розвертає формацію."
  "%1 масштаб"
  "[CRX] Тип повернення на позицію"
  "Обрати тип повернення на позицію групи ШІ. Примітка: Ніколи = Ванільна поведінка | Завжди = Повернення після всіх завдань | Атака = Повернення лише після бою | Розвідка = Повернення лише після розвідки без бою."
  "Ніколи"
  "Завжди"
  "Атака"
  "Розвідка"
  "%1 метрів"
  "%1 метр"
  "%1 секунд"
  "%1%"
  "%1 модифікатор"
  "%1 км/год"
  "%1 поріг ракет"
  "%1% шанс"
  "[CRX] Дистанція реакції на стрільбу"
  "Встановити дистанцію (у метрах), на якій група ШІ реагує на стрільбу."
  "[CRX] Дистанція чутності глушеної зброї"
  "Встановити дистанцію (у метрах), на якій група ШІ чує стрільбу з глушеної зброї."
  "[CRX] Розвідка"
  "Встановити, чи дозволено вибраній групі ШІ проводити розвідку."
  "[CRX] Радіус розвідки"
  "Встановити радіус розвідки (у метрах) групи ШІ. Примітка: -2 = Ванільний радіус | -1 = CRX радіус (визначається рівнем загрози та знанням про ворога)."
  "[CRX] Тривалість розвідки"
  "Встановити тривалість розвідки (у секундах) групи ШІ. Примітка: -1 = Ванільна тривалість."
  "[CRX] Обшук будівель при розвідці"
  "Встановити, чи дозволено групі ШІ обшукувати будівлі під час розвідки."
  "[CRX] Придушення"
  "Встановити, чи дозволено вибраній групі ШІ вести вогонь на придушення."
  "[CRX] Тривалість придушення"
  "Встановити тривалість придушення (у секундах) групи ШІ. Примітка: -1 = Ванільна тривалість."
  "[CRX] Шанс витрати магазинів при придушенні"
  "Встановити шанс витрати магазинів при придушенні. 100% = Ванільна поведінка | 0% = Без витрати магазинів при придушенні."
  "[CRX] Поріг боєприпасів РПГ при придушенні"
  "Встановити кількість ракет для збереження проти техніки. Примітка: 5 повністю запобігає стрільбі ракетами по піхоті."
  "[CRX] Час очікування РПГ"
  "Встановити час очікування (у секундах) заборони використання РПГ проти піхоти після такої атаки."
  "[CRX] Бойовий режим"
  "Встановити бойовий режим групи ШІ. Примітка: Червоний = Дуже агресивне просування (Червоний + Наступальний = найагресивніша комбінація). Жовтий = Агресивний, але рух на основі придушення. Білий = Рух від укриття до укриття."
  "Червоний"
  "Жовтий"
  "Зелений"
  "Білий"
  "[CRX] Шанс бойового переміщення"
  "Встановити шанс (у відсотках) переміщення групи ШІ у бою."
  "[CRX] Шанс використання укриття"
  "Встановити шанс (у відсотках) використання укриття групою ШІ у бою."
  "[CRX] Тип бойової поведінки"
  "Встановити бойову поведінку групи ШІ. ВАЖЛИВО: Не встановлюйте режим Окопів вручну. Примітка: Ближній бій = Дуже малі кроки близько до ворога. Міський = Малі кроки в будівлях. Оборонний = Підтримка безпечної дистанції. Наступальний = Просування впритул до ворога."
  "Ближній бій"
  "Міський"
  "Окопи"
  "За замовчуванням"
  "Оборонний"
  "Наступальний"
  "Механізований"
  "[CRX] Тип бойового руху"
  "Встановити тип руху групи ШІ у бою."
  "Група"
  "Індивідуальний"
  "[CRX] Модифікатор бойової дистанції"
  "Встановити модифікатор бойової дистанції (у метрах) групи ШІ. Примітка: Модифікує ближню/середню дистанцію бою. Дистанції залежать від типу зброї. Приблизно: Ближня ~50м | Середня ~50-150м."
  "[CRX] Модифікатор часу в укритті"
  "Встановити модифікатор часу в укритті (у секундах) групи ШІ. Примітка: Від'ємне значення скорочує час в укритті та прискорює пошук нового."
  "[CRX] Модифікатор затримки переміщення"
  "Встановити модифікатор затримки (у секундах) перед переміщенням на наступну позицію. Примітка: Від'ємне значення = швидше переміщення."
  "[CRX] Шанс динамічного пошуку укриття"
  "Встановити шанс пошуку нового укриття перебуваючи в укритті. Примітка: 0% зробить групу дуже статичною без руху між укриттями."
  "[CRX] Стійка"
  "Встановити стійку персонажа ШІ."
  "[CRX] Звання"
  "Встановити звання вибраного персонажа ШІ."
  "Рядовий"
  "Капрал"
  "Сержант"
  "Лейтенант"
  "Капітан"
  "[CRX] Тип звання"
  "Встановити тип звання вибраного персонажа ШІ."
  "CRX"
  "Ванільний"
  "[CRX] Тип переозброєння"
  "Встановити тип переозброєння персонажа ШІ. Примітка: Немає = Без переозброєння | За замовчуванням = Зброя та магазини ворогів і союзників | Фракція = Лише союзна зброя | Магазини = Лише магазини того ж типу."
  "Немає (Вимкнено)"
  "За замовчуванням (Зброя та магазини ворогів і союзників)"
  "Фракція (Лише зброя та магазини своєї фракції)"
  "Магазини (Лише сумісні з типом зброї)"
  "[CRX] Зброя напоготові"
  "Встановити стан зброї напоготові персонажа ШІ. Примітка: Не синхронізується через глобальні налаштування. ВАЖЛИВО! Не використовуйте одночасно \"Зброя напоготові > Підняти\" та \"Тип руху > Спринт\"! Це може порушити анімації."
  "Підняти"
  "Опустити"
  "[CRX] Тип руху"
  "Встановити тип руху персонажа ШІ. Примітка: Не синхронізується через глобальні налаштування. ВАЖЛИВО! Не використовуйте одночасно \"Зброя напоготові > Підняти\" та \"Тип руху > Спринт\"!"
  "Очікування"
  "Крок"
  "Біг"
  "Спринт"
  "[CRX] Сприйняття (безпека)"
  "Встановити сприйняття безпеки персонажа ШІ. Примітка: Вище значення = краще виявлення. Використовується в очікуванні. Ванілла = 1 | CRX = 1."
  "[CRX] Сприйняття (пильність)"
  "Встановити пильне сприйняття персонажа ШІ. Примітка: Вище = краще виявлення. Використовується без ворога, але з усвідомленням небезпеки. Ванілла = 2.5 | CRX = 3."
  "[CRX] Сприйняття (тривога)"
  "Встановити тривожне сприйняття персонажа ШІ. Примітка: Вище = краще виявлення. Використовується при усвідомленні присутності ворога. Ванілла = 2.5 | CRX = 3."
  "[CRX] Сприйняття (загроза)"
  "Встановити сприйняття під загрозою персонажа ШІ. Примітка: Вище = краще виявлення. Використовується у бою. Ванілла = 0.4 | CRX = 3."
  "[CRX] Модифікатор сприйняття"
  "Встановити модифікатор сприйняття персонажа ШІ. Примітка: Модифікатор застосовується до всіх налаштувань сприйняття."
  "[CRX] Похибка точності прицілювання"
  "Встановити/отримати похибку точності прицілювання персонажа ШІ. Примітка: Фактичне значення на основі звання/навички (0.50-2.00). Не синхронізується через глобальні налаштування."
  "[CRX] Модифікатор похибки прицілювання"
  "Встановити модифікатор похибки прицілювання персонажа ШІ. Примітка: Більше додатне значення = гірша точність. Базове значення: Ванілла = 1.0 | CRX = На основі звання 0.50-2.00."
  "[CRX] Утримувати позицію"
  "Встановіть \"Так\" щоб персонаж ШІ утримував поточну позицію. Зможе реагувати на небезпеку, але завжди повертатиметься на позицію."
  "[CRX] Радіус утримання позиції"
  "Встановити радіус (у метрах), в межах якого персонаж ШІ може рухатися при утриманні позиції."
  "[CRX] Оновити позицію утримання"
  "Натисніть для оновлення позиції утримання на поточну позицію."
  "Оновити"
  "[CRX] Шанс втечі"
  "Встановити шанс втечі персонажа ШІ при переважній силі ворога. Примітка: Понад 50% = дуже швидка втеча. 100% = майже миттєва втеча."
  "[CRX] Спостереження в очікуванні"
  "Встановити, чи дозволено персонажу ШІ спостерігати (оглядатися) в стані очікування (поза боєм)."
  "[CRX] Стан ліхтарика"
  "Встановити стан ліхтарика персонажа ШІ."
  "Увімк"
  "Вимк"
  "[CRX] Стан симуляції"
  "Встановити стан симуляції персонажа ШІ. Примітка: У режимі \"АВТОНОМНИЙ\" рушій автоматично керує симуляцією на основі LOD (відстані від гравця)."
  "[CRX] Режим вогню"
  "Встановити режим вогню персонажа ШІ."
  "Утримання"
  "Одиночний"
  "Черга"
  "Придушувальний"
  "[CRX] Примусово залишатися в техніці"
  "Примусити персонажа ШІ залишатися у призначеній техніці."
  "[CRX] Шанс реакції на небезпеку"
  "Встановити шанс реакції на небезпечні події. Примітка: Небезпечні події — \"Отримання шкоди\" та \"Влучання снаряда\"."
  "[CRX] Вимкнути керування зброєю"
  "При \"Так\" персонаж ШІ не зможе використовувати зброю."
  "[CRX] Вимкнути керування рухом"
  "При \"Так\" персонаж ШІ не зможе рухатися."
  "[CRX] Шанс витрати магазинів"
  "Встановити шанс витрати магазинів персонажа ШІ. Примітка: 0% = нескінченні боєприпаси."
  "[CRX] Модифікатор затримки реакції атаки"
  "Встановити модифікатор затримки атаки персонажа ШІ. Затримка від виявлення цілі до початку стрільби. Примітка: 0 = Ванільна затримка."
  "[CRX] Перевизначення глобальних налаштувань"
  "Перевизначити глобальні налаштування на основі вибраної групи ШІ. Примітка: ВСІ = Застосувати до всіх ШІ. НАСТУПНИЙ = Лише нові ШІ. ФРАКЦІЯ = Лише та ж фракція. ВИКЛЮЧИТИ = Виключити з перевизначення."
  "ВСІ"
  "НАСТУПНИЙ"
  "ФРАКЦІЯ"
  "ВИКЛЮЧИТИ"
  "[CRX] Швидкість"
  "Встановити швидкість техніки (км/год). Примітка: Швидкість за замовчуванням 50.0 км/год."
  "[CRX] Рівень пріоритету"
  "Встановити рівень пріоритету точки маршруту ШІ. Примітка: Геймстер встановлює максимальний пріоритет (2000.0) для \"Примусової\" точки."
  "Звичайний"
  "Високий"
