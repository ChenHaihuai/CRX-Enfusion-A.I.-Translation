 Texts {
  "[CRX] 姿态"
  "设置所选AI小组的姿态。"
  "站立"
  "蹲伏"
  "卧倒"
  "自动"
  "[CRX] 阵型"
  "设置所选AI小组的阵型。注意：战斗中，仅当\"战斗移动方式\"设为\"小组\"或\"火力组\"时，AI小组才会使用所选阵型。"
  "V字阵"
  "横排阵"
  "楔形阵"
  "纵队"
  "火力组"
  "菱形阵"
  "左梯队"
  "右梯队"
  "交错纵队"
  "自主"
  "[CRX] 阵型间距"
  "设置所选AI小组的阵型间距。注意：间距为1.0（默认值）时，AI小组会在战斗中根据威胁状态自动调整间距，可能导致阵型过于分散。设为非1.0的值（如1.1）可阻止战斗中自动调整。负值会使阵型方向反转。"
  "%1 倍"
  "[CRX] 返回原位方式"
  "选择AI小组的返回原位方式。注意：从不 = 原版行为 | 始终 = 完成所有任务（攻击或侦察）后始终返回出发位置 | 攻击后 = 仅在参与战斗后返回出发位置 | 侦察后 = 仅在完成侦察且未参与战斗时返回出发位置。"
  "从不"
  "始终"
  "攻击后"
  "侦察后"
  "%1 米"
  "%1 米"
  "%1 秒"
  "%1%"
  "%1 修正值"
  "%1 公里/时"
  "%1 枚火箭弹阈值"
  "%1% 概率"
  "[CRX] 枪声反应距离"
  "设置AI小组对枪声做出反应的距离（米）。"
  "[CRX] 消音武器可听距离"
  "设置AI小组能听到消音武器射击的距离（米）。"
  "[CRX] 侦察"
  "设置是否允许所选AI小组进行侦察。"
  "[CRX] 侦察半径"
  "设置AI小组侦察目标地点的半径（米）。注意：-2 = 原版侦察半径 | -1 = CRX侦察半径（根据威胁状态和敌情信息动态决定）。"
  "[CRX] 侦察持续时间"
  "设置AI小组允许侦察的持续时间（秒）。注意：-1 = 原版侦察时间。"
  "[CRX] 侦察时搜索建筑"
  "设置是否允许AI小组在侦察过程中搜索建筑物。"
  "[CRX] 压制"
  "设置是否允许所选AI小组进行压制射击。"
  "[CRX] 压制持续时间"
  "设置AI小组允许压制射击的持续时间（秒）。注意：-1 = 原版压制时间。"
  "[CRX] 压制时弹匣消耗概率"
  "设置AI小组在压制射击时消耗弹匣的概率。100% = 原版行为 | 0% = 压制时不消耗弹匣。"
  "[CRX] 压制时火箭弹保留阈值"
  "设置AI角色为车辆目标保留的火箭弹数量，避免对非车辆目标浪费火箭弹。注意：将阈值设为5可完全阻止AI对非车辆目标发射火箭弹。"
  "[CRX] 火箭弹使用冷却时间"
  "设置AI小组在对非车辆目标使用火箭弹后，被禁止再次对非车辆目标使用火箭弹的冷却时间（秒）。"
  "[CRX] 战斗模式"
  "设置AI小组的战斗模式。注意：红色 = 非常激进的推进行为（红色模式配合进攻型移动行为是最激进的组合）。黄色 = 仍然激进，但移动行为基于压制火力。白色 = 掩体间交替移动。"
  "红色"
  "黄色"
  "绿色"
  "白色"
  "[CRX] 战斗移动概率"
  "设置AI小组在战斗中允许移动的概率（百分比）。"
  "[CRX] 战斗利用掩体概率"
  "设置AI小组在战斗中利用掩体的概率（百分比）。"
  "[CRX] 战斗行为方式"
  "设置AI小组的战斗行为方式。重要：请勿手动设为堑壕模式。注意：近距离作战 = 以极小步幅移动，非常接近已知敌人位置。城市战 = 在建筑物内以较小步幅移动并调整战斗行为。防御 = 始终与敌人保持安全距离。进攻 = 允许推进到非常接近敌人的位置。"
  "近距离作战"
  "城市战"
  "堑壕"
  "默认"
  "防御"
  "进攻"
  "机械化"
  "[CRX] 战斗移动方式"
  "设置AI小组在战斗中使用的移动方式。"
  "小组"
  "个体"
  "[CRX] 战斗距离修正值"
  "设置AI小组的战斗距离修正值（米）。注意：通过修正值调整（降低/增加）近距离和中距离战斗范围。战斗范围由AI当前使用的武器类型决定，例如使用狙击步枪或机枪的AI战斗范围大于使用突击步枪的AI。大致范围：近距离约50米 | 中距离约50-150米。"
  "[CRX] 掩体停留时间修正值"
  "设置AI小组在掩体停留时间的修正值（秒）。注意：负值会缩短AI在当前掩体位置的停留时间，使其更快开始寻找新的掩体。"
  "[CRX] 转移至下一位置延迟修正值"
  "设置AI小组在当前位置停留后再转移到下一位置的延迟修正值（秒）。注意：负值 = 更快的转移速度。"
  "[CRX] 掩体中动态搜索新掩体概率"
  "设置AI小组在掩体中搜索新掩体的概率。注意：设为0%会使AI小组非常静态，不进行掩体间移动，某些情况下这正是期望的效果。"
  "[CRX] 姿态"
  "设置AI角色的姿态。"
  "[CRX] 军衔"
  "设置所选AI角色的军衔。"
  "列兵"
  "下士"
  "中士"
  "少尉"
  "上尉"
  "[CRX] 军衔体系"
  "设置所选AI角色的军衔体系。"
  "CRX"
  "原版"
  "[CRX] 补给方式"
  "设置AI角色的补给方式。注意：无 = 禁止补给 | 默认 = 可拾取敌友双方的武器和弹匣 | 阵营 = 仅可拾取友方武器和弹匣 | 弹匣 = 仅可拾取与原始弹匣相同类型的弹匣。"
  "无（禁用）"
  "默认（敌友双方的武器和弹匣）"
  "阵营（仅友方武器和弹匣）"
  "弹匣（仅与武器类型兼容的弹匣）"
  "[CRX] 举枪状态"
  "设置AI角色的举枪状态。注意：不会通过全局设置覆盖同步到其他AI。重要！不要同时使用\"举枪 > 举起\"和\"移动方式 > 冲刺\"！这可能导致战斗中AI移动动画异常。如果不确定请保持自主模式。"
  "举起"
  "放下"
  "[CRX] 移动方式"
  "设置AI角色的移动方式。注意：不会通过全局设置覆盖同步到其他AI。重要！不要同时使用\"举枪 > 举起\"和\"移动方式 > 冲刺\"！这可能导致战斗中AI移动动画异常。如果不确定请保持自主模式。"
  "待命"
  "步行"
  "跑步"
  "冲刺"
  "[CRX] 安全感知力"
  "设置AI角色的安全状态感知力。注意：数值越高 = 发现敌人越快越准。安全感知力用于AI处于空闲状态时。原版 = 1 | CRX = 1。"
  "[CRX] 警戒感知力"
  "设置AI角色的警戒感知力。注意：数值越高 = 发现敌人越快越准。警戒感知力用于AI尚未发现敌人但已察觉潜在危险时。原版 = 2.5 | CRX = 3。"
  "[CRX] 警报感知力"
  "设置AI角色的警报感知力。注意：数值越高 = 发现敌人越快越准。警报感知力用于AI已确认敌人存在时。原版 = 2.5 | CRX = 3。"
  "[CRX] 受威胁感知力"
  "设置AI角色的受威胁感知力。注意：数值越高 = 发现敌人越快越准。受威胁感知力用于AI处于战斗中时。原版 = 0.4 | CRX = 3。"
  "[CRX] 感知力修正值"
  "设置AI角色的感知力修正值。注意：此修正值会同时影响所有感知力设置。"
  "[CRX] 瞄准精度误差"
  "设置和查看AI角色的瞄准精度误差。注意：此值为AI角色当前实际使用的瞄准误差，基于军衔/技能等级，范围0.50-2.00。不会通过全局设置覆盖同步到其他AI。"
  "[CRX] 瞄准精度误差修正值"
  "设置AI角色的瞄准精度误差修正值。注意：正值越大 = 瞄准越不准。被修正的基础值：原版 = 1.0 | CRX = 基于AI军衔 0.50-2.00。"
  "[CRX] 固守位置"
  "设为\"是\"可让AI角色固守当前位置。AI角色仍能对危险事件做出反应并协助瞄准，但会始终返回固守位置。"
  "[CRX] 固守位置半径"
  "设置AI角色在固守位置时允许移动的半径（米）。"
  "[CRX] 更新固守位置"
  "点击将AI角色的固守位置更新为当前位置。"
  "更新"
  "[CRX] 逃跑概率"
  "设置AI角色在被敌人严重压制时逃跑的概率。注意：逃跑概率超过50%会导致AI非常快速地逃跑。100%会导致AI几乎立即逃跑，无论是否被压制。"
  "[CRX] 空闲观察"
  "设置是否允许AI角色在空闲状态（非战斗）时进行观察（环顾四周）。"
  "[CRX] 手电筒状态"
  "设置AI角色的手电筒状态。"
  "开启"
  "关闭"
  "[CRX] 模拟状态"
  "设置AI角色的模拟状态。注意：设为\"自主\"时，引擎会根据AI角色的LOD等级（与玩家或摄像机的距离）自动启用/禁用AI模拟。"
  "[CRX] 武器射击模式"
  "设置AI角色的武器射击模式。"
  "停火"
  "单发"
  "点射"
  "压制射击"
  "[CRX] 强制留在载具内"
  "强制AI角色留在其分配的载具中。"
  "[CRX] 危险反应概率"
  "设置AI对危险事件做出反应的概率（百分比）。注意：危险事件包括\"受到伤害\"和\"弹道命中\"。"
  "[CRX] 禁用武器操控"
  "设为\"是\"时，AI角色将无法使用武器。"
  "[CRX] 禁用移动操控"
  "设为\"是\"时，AI角色将无法移动。"
  "[CRX] 弹匣消耗概率"
  "设置AI角色消耗弹匣的概率。注意：0%时AI角色永远不会耗尽弹药。"
  "[CRX] 攻击反应延迟修正值"
  "设置AI角色的攻击反应延迟修正值。即从识别目标到实际开火/攻击之间的延迟时间。注意：0 = 原版攻击反应延迟。"
  "[CRX] 全局设置覆盖"
  "基于当前所选AI小组的设置覆盖\"全局设置\"。注意：全部 = 将当前AI小组的设置应用到所有已有和新生成的AI。下一个 = 仅将设置应用到新生成的AI。阵营 = 仅应用到同阵营的AI。排除 = 将当前AI小组排除在全局覆盖之外。"
  "全部"
  "下一个"
  "阵营"
  "排除"
  "[CRX] 速度"
  "设置所选载具的速度（公里/时）。注意：默认载具速度为50.0公里/时。"
  "[CRX] 优先级"
  "设置AI路径点的优先级，使特定路径点获得更高或更低的执行优先级。注意：Game Master会将路径点优先级设为最高值（2000.0），使其成为\"强制\"路径点。"
  "普通"
  "高"
  "[CRX] 载具速度"
  "基于路径点设置载具速度（公里/时）。注意：-1 = 不调整路径点载具速度。"
  "[CRX] 检测到时的路径点"
  "[CRX] 路径点完成半径"
  "[CRX] 移动中攻击概率"
  "设置AI小组在\"强制移动\"命令期间攻击目标的概率。注意：30-50%的概率被证明是移动与攻击之间的良好平衡。超过70%可能导致AI小组因频繁攻击而移动到路径点目的地非常缓慢。"
  "[CRX] 全局配置文件设置覆盖"
  "选择是否使用\"配置文件\"中的设置。"
  "[CRX] 全局武器开火反应距离"
  "设置AI小组应能对武器开火做出反应的全局距离（米）。"
  "[CRX] 全局消音武器开火可听距离"
  "设置AI小组能听到消音武器开火的全局距离（米）。"
  "[CRX] 全局压制"
  "设置是否允许AI小组进行全局压制射击。"
  "[CRX] 全局调查"
  "设置是否允许AI小组进行全局调查。"
  "[CRX] 全局战斗模式"
  "设置AI小组在战斗中使用的全局战斗模式。注意：红色 = 非常激进的移动和推进行为（红色战斗模式配合进攻型移动行为将是最激进的组合）。黄色 = 仍然激进但移动行为基于压制。白色 = 掩体间移动。"
  "[CRX] 全局补给方式"
  "设置AI角色的全局补给方式。注意：无 = 不补给 | 默认：敌方和友方的武器和弹匣 | 武器：仅友方武器和弹匣 | 弹匣：仅相同原始类型的弹匣。"
  "[CRX] 全局安全感知力"
  "设置AI角色的全局安全感知力。注意：数值越高 = 更好更快的敌人探测。全局安全感知力在AI空闲时使用。原版 = 1.0 | CRX = 1.0。"
  "[CRX] 全局警戒感知力"
  "设置AI角色的全局警戒感知力。注意：数值越高 = 更好更快的敌人探测。全局警戒感知力在AI检测到任何危险后使用。原版 = 2.5 | CRX = 3.0。"
  "[CRX] 全局感知力修正值"
  "设置AI角色的全局感知力修正值。注意：感知力修正值将按给定数值修改所有感知设置。"
  "[CRX] 全局瞄准精度误差修正值"
  "设置AI角色的全局瞄准精度误差修正值。注意：数值越高 = 瞄准精度越差。此修正值应用的基础值：原版 = 1.0 | CRX = 基于AI角色军衔 0.50 - 2.00。"
  "[CRX] 全局弹匣消耗概率"
  "设置AI角色消耗弹匣的概率。注意：0%时AI角色永远不会耗尽弹药。"
  "[CRX] 全局掩体中动态掩体搜索概率"
  "设置AI小组在掩体中搜索新掩体的全局概率。注意：有些人可能更希望AI在被攻击时留在特定掩体而不是切换/搜索新掩体。"
  "[CRX] 全局通讯处理超时"
  "设置AI允许通话的超时时间（秒）。注意：该值将按设定值随机增加。"
  "[CRX] 全局天气条件影响AI"
  "设置天气条件（雾/雨）是否影响AI视觉/探测。注意：只有恶劣天气才会影响AI，例如雾密度至少需要达到0.7或以上才能对视距产生实际影响。仍处于早期（测试）阶段。"
  "[CRX] 全局低光环境影响AI"
  "设置低光环境（夜间）是否影响AI视觉/探测。仍处于早期（测试）阶段。"
  "[CRX] 全局低光环境修正值"
  "设置用于影响AI视觉/探测的低光环境修正值。注意：数值越高 = 视觉/探测越差。仅使用小步进（0.3 - 0.5），因为它们已经非常有效。"
  "[CRX] 全局移动影响AI瞄准精度"
  "设置移动是否影响AI瞄准精度。注意：也会影响移动载具中AI的瞄准精度。仍处于早期（测试）阶段。"
  "[CRX] 全局感知阵营变化影响AI"
  "设置穿着敌方服装/制服是否影响AI对玩家的感知。这是CRX使用的原版AI功能。"
  "[CRX] 全局设置覆盖"
  "基于当前选中AI小组的设置覆盖\"全局设置\"。注意：ALL = 覆盖全局设置并应用于所有已生成和正在生成的AI。NEXT = 覆盖全局设置并仅应用于新生成的AI。EXCLUDE = 将选中的AI小组排除在所有全局设置覆盖之外。"
  "点击以基于当前选中AI小组的设置覆盖全局设置，并应用于所有已生成和正在生成的AI。"
  "点击以基于当前选中AI小组的设置覆盖全局设置，并仅应用于新生成的AI。"
  "点击以基于阵营和当前选中AI小组的设置覆盖全局设置，并仅应用于同一阵营的所有AI。"
  "点击将选中的AI小组排除在所有全局设置覆盖之外。"
