  "[CRX] Soppressione globale"
  "Impostare se i gruppi IA possono effettuare fuoco di soppressione globalmente."
  "[CRX] Indagine globale"
  "Impostare se i gruppi IA possono indagare globalmente."
  "[CRX] Modalità combattimento globale"
  "Impostare la modalità di combattimento globale dei gruppi IA. Nota: Rosso = Molto aggressivo. Giallo = Aggressivo ma basato sulla soppressione. Bianco = Movimento da copertura a copertura."
  "[CRX] Tipo di riarmamento globale"
  "Impostare il tipo di riarmamento globale dell'IA. Nota: Nessuno = Nessun riarmamento | Predefinito: Armi nemiche e alleate | Armi: Solo alleate | Caricatori: Solo stesso tipo."
  "[CRX] Percezione sicura globale"
  "Impostare la percezione sicura globale dell'IA. Nota: Più alto = migliore rilevamento. Usato in inattività. Vanilla = 1.0 | CRX = 1.0."
  "[CRX] Percezione vigile globale"
  "Impostare la percezione vigile globale dell'IA. Nota: Più alto = migliore rilevamento. Usato dopo il rilevamento di pericolo. Vanilla = 2.5 | CRX = 3.0."
  "[CRX] Modificatore percezione globale"
  "Impostare il modificatore di percezione globale dell'IA. Nota: Il modificatore modifica tutte le impostazioni di percezione."
  "[CRX] Modificatore globale errore precisione mira"
  "Impostare il modificatore globale di errore di mira dell'IA. Nota: Più alto = meno preciso. Base: Vanilla = 1.0 | CRX = per grado 0.50 - 2.00."
  "[CRX] Probabilità globale consumo caricatori"
  "Impostare la probabilità di consumo caricatori dell'IA. Nota: Al 0% l'IA non esaurirà mai le munizioni."
  "[CRX] Probabilità globale ricerca copertura dinamica in combattimento"
  "Impostare la probabilità globale di ricerca di nuova copertura dei gruppi IA. Nota: Alcuni preferiscono che l'IA rimanga in una copertura specifica."
  "[CRX] Timeout globale gestore comunicazioni"
  "Impostare il timeout (in secondi) di comunicazione dell'IA. Nota: Il valore verrà aumentato casualmente."
  "[CRX] Condizioni meteo globali influenzano l'IA"
  "Impostare se le condizioni meteo (nebbia/pioggia) influenzano la visione/rilevamento dell'IA. Nota: Solo condizioni gravi hanno effetto. Fase beta iniziale."
  "[CRX] Ambiente a bassa luminosità globale influenza l'IA"
  "Impostare se la scarsa luminosità (notte) influenza la visione/rilevamento dell'IA. Fase beta iniziale."
  "[CRX] Modificatore globale ambiente a bassa luminosità"
  "Impostare il modificatore di bassa luminosità per la visione/rilevamento dell'IA. Nota: Più alto = peggiore visione. Usare piccoli incrementi (0.3 - 0.5)."
  "[CRX] Il movimento globale influenza la precisione di mira dell'IA"
  "Impostare se il movimento influenza la precisione di mira dell'IA. Nota: Influenza anche l'IA nei veicoli in movimento. Fase beta iniziale."
  "[CRX] Cambiamenti fazione percepita globali influenzano l'IA"
