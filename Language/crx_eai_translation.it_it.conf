 Texts {
  "[CRX] Postura"
  "Imposta la postura del gruppo IA selezionato."
  "IN PIEDI"
  "ACCOVACCIATO"
  "PRONO"
  "AUTO"
  "[CRX] Formazione"
  "Imposta la formazione del gruppo IA selezionato. Nota: In combattimento, la formazione selezionata verrà usata solo se il \"Tipo di movimento in combattimento\" è impostato su \"GRUPPO\" o \"SQUADRA DI FUOCO\"."
  "V"
  "Linea"
  "Cuneo"
  "Colonna"
  "Squadra di fuoco"
  "Diamante"
  "Scaglione sinistro"
  "Scaglione destro"
  "Colonna sfalsata"
  "Autonomo"
  "[CRX] Scala formazione"
  "Imposta la scala della formazione del gruppo IA selezionato. Nota: A 1.0 (predefinito), il gruppo regola automaticamente la scala in combattimento. Un valore diverso da 1.0 (es: 1.1) disabilita la regolazione automatica. I valori negativi invertono l'orientamento."
  "%1 scala"
  "[CRX] Tipo di ritorno alla posizione"
  "Selezionare il tipo di ritorno alla posizione del gruppo IA. Nota: Mai = Vanilla | Sempre = Ritorno dopo tutti i compiti | Attacco = Ritorno solo dopo il combattimento | Indagine = Ritorno solo dopo indagine senza combattimento."
  "Mai"
  "Sempre"
  "Attacco"
  "Indagine"
  "%1 metri"
  "%1 metro"
  "%1 secondi"
  "%1%"
  "%1 modificatore"
  "%1 km/h"
  "%1 soglia razzi"
  "%1% probabilità"
  "[CRX] Distanza di reazione agli spari"
  "Impostare la distanza (in metri) entro cui il gruppo IA reagisce agli spari."
  "[CRX] Distanza udibile armi silenziate"
  "Impostare la distanza (in metri) entro cui il gruppo IA sente gli spari silenziati."
  "[CRX] Indagine"
  "Impostare se il gruppo IA selezionato può effettuare indagini."
  "[CRX] Raggio di indagine"
  "Impostare il raggio di indagine (in metri) del gruppo IA. Nota: -2 = Raggio vanilla | -1 = Raggio CRX (determinato dallo stato di minaccia e conoscenza del nemico)."
  "[CRX] Durata indagine"
  "Impostare la durata dell'indagine (in secondi) del gruppo IA. Nota: -1 = Durata vanilla."
  "[CRX] Perquisizione edifici in indagine"
  "Impostare se il gruppo IA può perquisire edifici durante l'indagine."
  "[CRX] Soppressione"
  "Impostare se il gruppo IA selezionato può effettuare fuoco di soppressione."
  "[CRX] Durata soppressione"
  "Impostare la durata della soppressione (in secondi) del gruppo IA. Nota: -1 = Durata vanilla."
  "[CRX] Probabilità consumo caricatori in soppressione"
  "Impostare la probabilità di consumo caricatori in soppressione. 100% = Vanilla | 0% = Nessun consumo in soppressione."
  "[CRX] Soglia munizioni lanciarazzi in soppressione"
  "Impostare il numero di razzi da conservare per i veicoli. Nota: 5 impedisce completamente il lancio di razzi contro bersagli non veicoli."
  "[CRX] Tempo di attesa lanciarazzi"
  "Impostare il tempo di attesa (in secondi) per impedire l'uso di lanciarazzi contro bersagli non veicoli dopo un tale attacco."
  "[CRX] Modalità di combattimento"
  "Impostare la modalità di combattimento del gruppo IA. Nota: Rosso = Comportamento molto aggressivo (Rosso + Offensivo = combinazione più aggressiva). Giallo = Aggressivo ma movimento basato sulla soppressione. Bianco = Movimento da copertura a copertura."
  "Rosso"
  "Giallo"
  "Verde"
  "Bianco"
  "[CRX] Probabilità movimento in combattimento"
  "Impostare la probabilità (in percentuale) di movimento del gruppo IA in combattimento."
  "[CRX] Probabilità uso copertura"
  "Impostare la probabilità (in percentuale) di uso della copertura del gruppo IA in combattimento."
  "[CRX] Tipo di comportamento in combattimento"
  "Impostare il comportamento di combattimento del gruppo IA. IMPORTANTE: Non impostare Trincea manualmente. Nota: CQB = Passi molto piccoli vicino al nemico. Urbano = Passi piccoli negli edifici. Difensivo = Mantenere distanza di sicurezza. Offensivo = Avanzata ravvicinata al nemico."
  "CQB"
  "Urbano"
  "Trincea"
  "Predefinito"
  "Difensivo"
  "Offensivo"
  "Meccanizzato"
  "[CRX] Tipo di movimento in combattimento"
  "Impostare il tipo di movimento del gruppo IA in combattimento."
  "Gruppo"
  "Individuale"
  "[CRX] Modificatore distanza di combattimento"
  "Impostare il modificatore di distanza di combattimento (in metri) del gruppo IA. Nota: Modifica le distanze di combattimento (corta/media). Le distanze dipendono dal tipo di arma. Approssimativamente: Corta ~50m | Media ~50-150m."
  "[CRX] Modificatore durata in copertura"
  "Impostare il modificatore di durata in copertura (in secondi) del gruppo IA. Nota: I valori negativi riducono il tempo in copertura e accelerano la ricerca di nuova posizione."
  "[CRX] Modificatore ritardo spostamento"
  "Impostare il modificatore di ritardo (in secondi) prima dello spostamento alla posizione successiva. Nota: Valore negativo = movimento più rapido."
  "[CRX] Probabilità ricerca dinamica copertura"
  "Impostare la probabilità di ricerca di nuova copertura mentre si è in copertura. Nota: 0% rende il gruppo molto statico senza movimento da copertura a copertura."
  "[CRX] Postura"
  "Imposta la postura del personaggio IA."
  "[CRX] Grado"
  "Impostare il grado del personaggio IA selezionato."
  "Soldato"
  "Caporale"
  "Sergente"
  "Tenente"
  "Capitano"
  "[CRX] Tipo di grado"
  "Impostare il tipo di grado del personaggio IA selezionato."
  "CRX"
  "Vanilla"
  "[CRX] Tipo di riarmamento"
  "Impostare il tipo di riarmamento del personaggio IA. Nota: Nessuno = Nessun riarmamento | Predefinito = Armi e caricatori nemici e alleati | Fazione = Solo armi alleate | Caricatori = Solo caricatori dello stesso tipo."
  "Nessuno (Disabilitato)"
  "Predefinito (Armi e caricatori nemici e alleati)"
  "Fazione (Solo armi e caricatori della propria fazione)"
  "Caricatori (Solo compatibili con il tipo di arma)"
  "[CRX] Arma alzata"
  "Impostare lo stato di arma alzata del personaggio IA. Nota: Non sincronizzato tramite impostazioni globali. IMPORTANTE! Non usare simultaneamente \"Arma alzata > Alzare\" e \"Tipo di movimento > Sprint\"! Può causare problemi di animazione."
  "Alzare"
  "Abbassare"
  "[CRX] Tipo di movimento"
  "Impostare il tipo di movimento del personaggio IA. Nota: Non sincronizzato tramite impostazioni globali. IMPORTANTE! Non usare simultaneamente \"Arma alzata > Alzare\" e \"Tipo di movimento > Sprint\"!"
  "Inattivo"
  "Camminare"
  "Correre"
  "Sprint"
  "[CRX] Percezione sicura"
  "Impostare la percezione sicura del personaggio IA. Nota: Valore più alto = migliore rilevamento. Usata in attesa. Vanilla = 1 | CRX = 1."
  "[CRX] Percezione vigile"
  "Impostare la percezione vigile del personaggio IA. Nota: Valore più alto = migliore rilevamento. Usata senza nemico ma consapevole del pericolo. Vanilla = 2.5 | CRX = 3."
  "[CRX] Percezione in allerta"
  "Impostare la percezione in allerta del personaggio IA. Nota: Valore più alto = migliore rilevamento. Usata quando il nemico è rilevato. Vanilla = 2.5 | CRX = 3."
  "[CRX] Percezione minacciata"
  "Impostare la percezione minacciata del personaggio IA. Nota: Valore più alto = migliore rilevamento. Usata in combattimento. Vanilla = 0.4 | CRX = 3."
  "[CRX] Modificatore percezione"
  "Impostare il modificatore di percezione del personaggio IA. Nota: Il modificatore si applica a tutte le impostazioni di percezione."
  "[CRX] Errore precisione mira"
  "Impostare/ottenere l'errore di precisione mira del personaggio IA. Nota: Valore reale basato su grado/abilità (0.50-2.00). Non sincronizzato tramite impostazioni globali."
  "[CRX] Modificatore errore precisione mira"
  "Impostare il modificatore di errore di mira del personaggio IA. Nota: Valore positivo più alto = peggiore precisione. Valore base: Vanilla = 1.0 | CRX = Basato su grado 0.50-2.00."
  "[CRX] Mantenere posizione"
  "Impostare \"Sì\" per mantenere il personaggio IA nella posizione attuale. Potrà reagire ai pericoli ma tornerà sempre alla posizione."
  "[CRX] Raggio mantenimento posizione"
  "Impostare il raggio (in metri) entro cui il personaggio IA può muoversi mantenendo la posizione."
  "[CRX] Aggiorna posizione"
  "Clicca per aggiornare la posizione di mantenimento con la posizione attuale."
  "Aggiorna"
  "[CRX] Probabilità di fuga"
  "Impostare la probabilità di fuga del personaggio IA contro nemici superiori. Nota: Sopra il 50% = fuga molto rapida. 100% = fuga quasi istantanea."
  "[CRX] Osservatore inattivo"
  "Impostare se il personaggio IA può osservare (guardarsi intorno) in stato inattivo (fuori combattimento)."
  "[CRX] Stato torcia"
  "Impostare lo stato della torcia del personaggio IA."
  "Acceso"
  "Spento"
  "[CRX] Stato simulazione"
  "Impostare lo stato di simulazione del personaggio IA. Nota: In modalità \"AUTONOMO\", il motore gestisce automaticamente la simulazione in base al LOD (distanza dal giocatore)."
  "[CRX] Modalità di fuoco"
  "Impostare la modalità di fuoco del personaggio IA."
  "Trattenere"
  "Colpo singolo"
  "Raffica"
  "Soppressivo"
  "[CRX] Forzare permanenza nel veicolo"
  "Forzare il personaggio IA a rimanere nel veicolo assegnato."
  "[CRX] Probabilità reazione al pericolo"
  "Impostare la probabilità di reazione agli eventi di pericolo. Nota: Gli eventi sono \"Danno subito\" e \"Impatto proiettile\"."
  "[CRX] Disabilita controlli arma"
  "Se \"Sì\", il personaggio IA non potrà usare la sua arma."
  "[CRX] Disabilita controlli movimento"
  "Se \"Sì\", il personaggio IA non potrà muoversi."
  "[CRX] Probabilità consumo caricatori"
  "Impostare la probabilità di consumo caricatori del personaggio IA. Nota: 0% = munizioni infinite."
  "[CRX] Modificatore ritardo reazione attacco"
  "Impostare il modificatore di ritardo di attacco del personaggio IA. Ritardo dall'identificazione allo sparo. Nota: 0 = Ritardo vanilla."
  "[CRX] Sovrascrittura impostazioni globali"
  "Sovrascrivere le impostazioni globali basate sul gruppo IA selezionato. Nota: TUTTI = Applicare a tutti gli IA. PROSSIMO = Solo nuovi IA. FAZIONE = Solo stessa fazione. ESCLUDERE = Escludere dalla sovrascrittura."
  "TUTTI"
  "PROSSIMO"
  "FAZIONE"
  "ESCLUDERE"
  "[CRX] Velocità"
  "Impostare la velocità del veicolo (km/h). Nota: Velocità predefinita 50.0 km/h."
  "[CRX] Livello di priorità"
