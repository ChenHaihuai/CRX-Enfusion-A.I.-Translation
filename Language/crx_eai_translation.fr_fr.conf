 Texts {
  "[CRX] Posture"
  "Définir la posture du groupe IA sélectionné."
  "DEBOUT"
  "ACCROUPI"
  "COUCHÉ"
  "AUTO"
  "[CRX] Formation"
  "Définir la formation du groupe IA sélectionné. Note : En combat, la formation sélectionnée ne sera utilisée que si le \"Type de mouvement de combat\" est réglé sur \"GROUPE\" ou \"ÉQUIPE DE FEU\"."
  "Vee"
  "Ligne"
  "Coin"
  "Colonne"
  "Équipe de feu"
  "Losange"
  "Échelon gauche"
  "Échelon droit"
  "Colonne décalée"
  "Autonome"
  "[CRX] Échelle de formation"
  "Définir l'échelle de formation du groupe IA sélectionné. Note : À 1.0 (défaut), le groupe ajuste automatiquement l'échelle en combat. Une valeur différente de 1.0 (ex: 1.1) désactive l'ajustement automatique. Une valeur négative inverse l'orientation."
  "%1 échelle"
  "[CRX] Type de retour à la position"
  "Sélectionner le type de retour à la position du groupe IA. Note : Jamais = Vanilla | Toujours = Retour systématique après toutes les tâches | Attaque = Retour uniquement après un combat | Investigation = Retour uniquement après une investigation sans combat."
  "Jamais"
  "Toujours"
  "Attaque"
  "Investigation"
  "%1 mètres"
  "%1 mètre"
  "%1 secondes"
  "%1%"
  "%1 modificateur"
  "%1 km/h"
  "%1 seuil de roquettes"
  "%1% de chance"
  "[CRX] Distance de réaction aux tirs"
  "Définir la distance (en mètres) à laquelle le groupe IA réagit aux tirs."
  "[CRX] Distance audible des armes supprimées"
  "Définir la distance (en mètres) à laquelle le groupe IA entend les tirs supprimés."
  "[CRX] Investigation"
  "Autoriser ou non l'investigation du groupe IA sélectionné."
  "[CRX] Rayon d'investigation"
  "Définir le rayon d'investigation (en mètres) du groupe IA. Note : -2 = Rayon vanilla | -1 = Rayon CRX (déterminé par l'état de menace et la connaissance de l'ennemi)."
  "[CRX] Durée d'investigation"
  "Définir la durée d'investigation (en secondes) du groupe IA. Note : -1 = Durée vanilla."
  "[CRX] Fouille de bâtiments en investigation"
  "Autoriser ou non la fouille de bâtiments pendant l'investigation."
  "[CRX] Suppression"
  "Autoriser ou non le tir de suppression du groupe IA sélectionné."
  "[CRX] Durée de suppression"
  "Définir la durée de suppression (en secondes) du groupe IA. Note : -1 = Durée vanilla."
  "[CRX] Chance de consommation de chargeurs en suppression"
  "Définir la chance de consommation de chargeurs en suppression. 100% = Vanilla | 0% = Pas de consommation en suppression."
  "[CRX] Seuil de munitions lance-roquettes en suppression"
  "Définir le nombre de roquettes à conserver pour les véhicules. Note : 5 empêche totalement le tir de roquettes sur les cibles non-véhicules."
  "[CRX] Délai d'attente lance-roquettes"
  "Définir le délai (en secondes) d'interdiction d'utilisation du lance-roquettes contre les non-véhicules après une telle attaque."
  "[CRX] Mode de combat"
  "Définir le mode de combat du groupe IA. Note : Rouge = Comportement très agressif (Rouge + Offensif = combinaison la plus agressive). Jaune = Agressif mais mouvement basé sur la suppression. Blanc = Mouvement de couverture en couverture."
  "Rouge"
  "Jaune"
  "Vert"
  "Blanc"
  "[CRX] Chance de mouvement en combat"
  "Définir la chance (en pourcentage) de mouvement du groupe IA en combat."
  "[CRX] Chance d'utilisation de couverture"
  "Définir la chance (en pourcentage) d'utilisation de couverture du groupe IA en combat."
  "[CRX] Type de comportement de combat"
  "Définir le comportement de combat du groupe IA. IMPORTANT : Ne pas régler sur Tranchée manuellement. Note : CQB = Déplacement à très petits pas près de l'ennemi. Urbain = Petits pas dans les bâtiments. Défensif = Maintien d'une distance de sécurité. Offensif = Avancée proche de l'ennemi."
  "CQB"
  "Urbain"
  "Tranchée"
  "Par défaut"
  "Défensif"
  "Offensif"
  "Mécanisé"
  "[CRX] Type de mouvement de combat"
  "Définir le type de mouvement du groupe IA en combat."
  "Groupe"
  "Individuel"
  "[CRX] Modificateur de distance de combat"
  "Définir le modificateur de distance de combat (en mètres) du groupe IA. Note : Modifie les portées de combat (courte/moyenne). Les portées dépendent du type d'arme. Environ : Courte ~50m | Moyenne ~50-150m."
  "[CRX] Modificateur de durée en couverture"
  "Définir le modificateur de durée en couverture (en secondes) du groupe IA. Note : Une valeur négative réduit le temps en couverture et accélère la recherche d'une nouvelle position."
  "[CRX] Modificateur de délai de déplacement"
  "Définir le modificateur de délai (en secondes) avant le déplacement vers la position suivante. Note : Valeur négative = mouvement plus rapide."
  "[CRX] Chance de recherche dynamique de couverture"
  "Définir la chance de recherche de nouvelle couverture en étant couvert. Note : 0% rend le groupe très statique sans mouvement de couverture en couverture."
  "[CRX] Posture"
  "Définir la posture du personnage IA."
  "[CRX] Grade"
  "Définir le grade du personnage IA sélectionné."
  "Soldat"
  "Caporal"
  "Sergent"
  "Lieutenant"
  "Capitaine"
  "[CRX] Type de grade"
  "Définir le type de grade du personnage IA sélectionné."
  "CRX"
  "Vanilla"
  "[CRX] Type de réarmement"
  "Définir le type de réarmement du personnage IA. Note : Aucun = Pas de réarmement | Défaut = Armes et chargeurs ennemis et alliés | Faction = Armes alliées uniquement | Chargeurs = Chargeurs du même type uniquement."
  "Aucun (Désactivé)"
  "Défaut (Armes et chargeurs ennemis et alliés)"
  "Faction (Armes et chargeurs de sa faction uniquement)"
  "Chargeurs (Uniquement compatibles avec le type d'arme)"
  "[CRX] Arme levée"
  "Définir l'état d'arme levée du personnage IA. Note : Non synchronisé via les paramètres globaux. IMPORTANT ! N'utilisez pas simultanément \"Arme levée > Lever\" et \"Type de mouvement > Sprint\" ! Cela peut perturber les animations."
  "Lever"
  "Baisser"
  "[CRX] Type de mouvement"
  "Définir le type de mouvement du personnage IA. Note : Non synchronisé via les paramètres globaux. IMPORTANT ! N'utilisez pas simultanément \"Arme levée > Lever\" et \"Type de mouvement > Sprint\" !"
  "Inactif"
  "Marche"
  "Course"
  "Sprint"
  "[CRX] Perception sûre"
  "Définir la perception sûre du personnage IA. Note : Valeur plus élevée = meilleure détection. Utilisée en veille. Vanilla = 1 | CRX = 1."
  "[CRX] Perception vigilante"
  "Définir la perception vigilante du personnage IA. Note : Valeur plus élevée = meilleure détection. Utilisée sans ennemi mais conscient du danger. Vanilla = 2.5 | CRX = 3."
  "[CRX] Perception en alerte"
  "Définir la perception en alerte du personnage IA. Note : Valeur plus élevée = meilleure détection. Utilisée quand l'ennemi est détecté. Vanilla = 2.5 | CRX = 3."
  "[CRX] Perception menacée"
  "Définir la perception menacée du personnage IA. Note : Valeur plus élevée = meilleure détection. Utilisée en combat. Vanilla = 0.4 | CRX = 3."
  "[CRX] Modificateur de perception"
  "Définir le modificateur de perception du personnage IA. Note : Le modificateur s'applique à tous les paramètres de perception."
  "[CRX] Erreur de précision de visée"
  "Définir/obtenir l'erreur de précision de visée du personnage IA. Note : Valeur réelle basée sur le grade/compétence (0.50-2.00). Non synchronisé via les paramètres globaux."
  "[CRX] Modificateur d'erreur de visée"
  "Définir le modificateur d'erreur de visée du personnage IA. Note : Valeur positive plus élevée = moins de précision. Valeur de base : Vanilla = 1.0 | CRX = Basé sur le grade 0.50-2.00."
  "[CRX] Maintenir la position"
  "Régler sur \"Oui\" pour maintenir le personnage IA à sa position actuelle. Il pourra réagir aux dangers mais reviendra toujours à sa position."
  "[CRX] Rayon de maintien de position"
  "Définir le rayon (en mètres) dans lequel le personnage IA peut se déplacer en maintenant sa position."
  "[CRX] Mettre à jour la position"
  "Cliquer pour mettre à jour la position de maintien avec la position actuelle."
  "Mettre à jour"
  "[CRX] Chance de fuite"
  "Définir la chance de fuite du personnage IA face à un ennemi supérieur. Note : Au-dessus de 50% = fuite très rapide. 100% = fuite quasi instantanée."
  "[CRX] Observation en veille"
  "Autoriser ou non l'observation (regarder autour) du personnage IA en veille (hors combat)."
  "[CRX] État de la lampe torche"
  "Définir l'état de la lampe torche du personnage IA."
  "Activé"
  "Désactivé"
  "[CRX] État de simulation"
  "Définir l'état de simulation du personnage IA. Note : En mode \"AUTONOME\", le moteur gère automatiquement la simulation selon le LOD (distance au joueur)."
  "[CRX] Mode de tir"
  "Définir le mode de tir du personnage IA."
  "Retenir"
  "Coup par coup"
  "Rafale"
  "Suppressif"
  "[CRX] Forcer à rester dans le véhicule"
  "Forcer le personnage IA à rester dans son véhicule assigné."
  "[CRX] Chance de réaction au danger"
  "Définir la chance de réaction aux événements de danger. Note : Les événements sont \"Dégâts reçus\" et \"Impact de projectile\"."
  "[CRX] Désactiver les contrôles d'arme"
  "Si \"Oui\", le personnage IA ne pourra pas utiliser son arme."
  "[CRX] Désactiver les contrôles de mouvement"
  "Si \"Oui\", le personnage IA ne pourra pas se déplacer."
  "[CRX] Chance de consommation de chargeurs"
  "Définir la chance de consommation de chargeurs du personnage IA. Note : 0% = munitions infinies."
  "[CRX] Modificateur de délai de réaction d'attaque"
  "Définir le modificateur de délai d'attaque du personnage IA. Délai entre l'identification et le tir. Note : 0 = Délai vanilla."
  "[CRX] Remplacement des paramètres globaux"
  "Remplacer les paramètres globaux basés sur le groupe IA sélectionné. Note : TOUS = Appliquer à tous les IA. SUIVANT = Nouveaux IA uniquement. FACTION = Même faction uniquement. EXCLURE = Exclure du remplacement."
  "TOUS"
  "SUIVANT"
  "FACTION"
  "EXCLURE"
  "[CRX] Vitesse"
  "Définir la vitesse du véhicule (km/h). Note : Vitesse par défaut 50.0 km/h."
  "[CRX] Niveau de priorité"
