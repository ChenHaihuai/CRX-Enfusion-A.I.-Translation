 Texts {
  "[CRX] Postoj"
  "Nastavit postoj vybrané skupiny AI."
  "STÁT"
  "DŘEP"
  "LEHNOUT"
  "AUTO"
  "[CRX] Formace"
  "Nastavit formaci vybrané skupiny AI. Poznámka: Během boje bude vybraná formace použita pouze pokud je \"Typ bojového pohybu\" nastaven na \"SKUPINA\" nebo \"PALEBNÁ SKUPINA\"."
  "V formace"
  "Řada"
  "Klín"
  "Kolona"
  "Palebná skupina"
  "Diamant"
  "Echelon vlevo"
  "Echelon vpravo"
  "Střídavá kolona"
  "Autonomní"
  "[CRX] Měřítko formace"
  "Nastavit měřítko formace vybrané skupiny AI. Poznámka: Při 1.0 (výchozí) skupina automaticky upravuje měřítko v boji. Hodnota jiná než 1.0 (např. 1.1) automatickou úpravu deaktivuje. Záporné hodnoty otočí orientaci."
  "%1 měřítko"
  "[CRX] Typ návratu na pozici"
  "Vybrat typ návratu na pozici skupiny AI. Poznámka: Nikdy = Vanilla | Vždy = Návrat po všech úkolech | Útok = Návrat pouze po boji | Průzkum = Návrat pouze po průzkumu bez boje."
  "Nikdy"
  "Vždy"
  "Útok"
  "Průzkum"
  "%1 metrů"
  "%1 metr"
  "%1 sekund"
  "%1%"
  "%1 modifikátor"
  "%1 km/h"
  "%1 práh raket"
  "%1% šance"
  "[CRX] Vzdálenost reakce na střelbu"
  "Nastavit vzdálenost (v metrech), ve které skupina AI reaguje na střelbu."
  "[CRX] Slyšitelná vzdálenost tlumených zbraní"
  "Nastavit vzdálenost (v metrech), ve které skupina AI slyší tlumenou střelbu."
  "[CRX] Průzkum"
  "Nastavit, zda vybraná skupina AI může provádět průzkum."
  "[CRX] Poloměr průzkumu"
  "Nastavit poloměr průzkumu (v metrech) skupiny AI. Poznámka: -2 = Vanilla poloměr | -1 = CRX poloměr (určen stavem hrozby a znalostí nepřítele)."
  "[CRX] Doba průzkumu"
  "Nastavit dobu průzkumu (v sekundách) skupiny AI. Poznámka: -1 = Vanilla doba."
  "[CRX] Prohledávání budov při průzkumu"
  "Nastavit, zda skupina AI může prohledávat budovy během průzkumu."
  "[CRX] Potlačení"
  "Nastavit, zda vybraná skupina AI může provádět potlačovací palbu."
  "[CRX] Doba potlačení"
  "Nastavit dobu potlačení (v sekundách) skupiny AI. Poznámka: -1 = Vanilla doba."
  "[CRX] Šance spotřeby zásobníků při potlačení"
  "Nastavit šanci spotřeby zásobníků při potlačení. 100% = Vanilla | 0% = Žádná spotřeba při potlačení."
  "[CRX] Práh munice raketometu při potlačení"
  "Nastavit počet raket k uchování pro vozidla. Poznámka: 5 zcela zabrání střelbě raketami na nevozidlové cíle."
  "[CRX] Doba čekání raketometu"
  "Nastavit dobu čekání (v sekundách) zákazu použití raketometu proti nevozidlovým cílům po takovém útoku."
  "[CRX] Bojový režim"
  "Nastavit bojový režim skupiny AI. Poznámka: Červený = Velmi agresivní postup (Červený + Útočný = nejagresivnější kombinace). Žlutý = Agresivní, ale pohyb založen na potlačení. Bílý = Pohyb od krytu ke krytu."
  "Červený"
  "Žlutý"
  "Zelený"
  "Bílý"
  "[CRX] Šance bojového pohybu"
  "Nastavit šanci (v procentech) pohybu skupiny AI v boji."
  "[CRX] Šance použití krytu"
  "Nastavit šanci (v procentech) použití krytu skupinou AI v boji."
  "[CRX] Typ bojového chování"
  "Nastavit bojové chování skupiny AI. DŮLEŽITÉ: Nenastavujte režim Zákopů ručně. Poznámka: CQB = Velmi malé kroky blízko nepřítele. Městský = Malé kroky v budovách. Obranný = Udržování bezpečné vzdálenosti. Útočný = Postup blízko k nepříteli."
  "CQB"
  "Městský"
  "Zákopy"
  "Výchozí"
  "Obranný"
  "Útočný"
  "Mechanizovaný"
  "[CRX] Typ bojového pohybu"
  "Nastavit typ pohybu skupiny AI v boji."
  "Skupina"
  "Individuální"
  "[CRX] Modifikátor bojové vzdálenosti"
  "Nastavit modifikátor bojové vzdálenosti (v metrech) skupiny AI. Poznámka: Modifikuje bojové dosah (blízký/střední). Dosah závisí na typu zbraně. Přibližně: Blízký ~50m | Střední ~50-150m."
  "[CRX] Modifikátor doby v krytu"
  "Nastavit modifikátor doby v krytu (v sekundách) skupiny AI. Poznámka: Záporné hodnoty zkracují dobu v krytu a urychlují hledání nové pozice."
  "[CRX] Modifikátor zpoždění pohybu"
  "Nastavit modifikátor zpoždění (v sekundách) před pohybem na další pozici. Poznámka: Záporná hodnota = rychlejší pohyb."
  "[CRX] Šance dynamického hledání krytu"
  "Nastavit šanci hledání nového krytu z krytu. Poznámka: 0% učiní skupinu velmi statickou bez pohybu od krytu ke krytu."
  "[CRX] Postoj"
  "Nastavit postoj postavy AI."
  "[CRX] Hodnost"
  "Nastavit hodnost vybrané postavy AI."
  "Vojín"
  "Desátník"
  "Seržant"
  "Poručík"
  "Kapitán"
  "[CRX] Typ hodnosti"
  "Nastavit typ hodnosti vybrané postavy AI."
  "CRX"
  "Vanilla"
  "[CRX] Typ přezbrojení"
  "Nastavit typ přezbrojení postavy AI. Poznámka: Žádný = Bez přezbrojení | Výchozí = Zbraně a zásobníky nepřátel i spojenců | Frakce = Pouze spojenecké zbraně | Zásobníky = Pouze zásobníky stejného typu."
  "Žádný (Vypnuto)"
  "Výchozí (Zbraně a zásobníky nepřátel i spojenců)"
  "Frakce (Pouze zbraně a zásobníky vlastní frakce)"
  "Zásobníky (Pouze kompatibilní s typem zbraně)"
  "[CRX] Zbraň zdvižena"
  "Nastavit stav zdvižené zbraně postavy AI. Poznámka: Nesynchronizováno přes globální nastavení. DŮLEŽITÉ! Nepoužívejte současně \"Zbraň zdvižena > Zdvihnout\" a \"Typ pohybu > Sprint\"! Může narušit animace."
  "Zdvihnout"
  "Sklopit"
  "[CRX] Typ pohybu"
  "Nastavit typ pohybu postavy AI. Poznámka: Nesynchronizováno přes globální nastavení. DŮLEŽITÉ! Nepoužívejte současně \"Zbraň zdvižena > Zdvihnout\" a \"Typ pohybu > Sprint\"!"
  "Nečinný"
  "Chůze"
  "Běh"
  "Sprint"
  "[CRX] Vnímání (bezpečí)"
  "Nastavit bezpečné vnímání postavy AI. Poznámka: Vyšší hodnota = lepší detekce. Používáno v nečinnosti. Vanilla = 1 | CRX = 1."
  "[CRX] Vnímání (bdělost)"
  "Nastavit bdělé vnímání postavy AI. Poznámka: Vyšší = lepší detekce. Používáno bez nepřítele, ale s vědomím nebezpečí. Vanilla = 2.5 | CRX = 3."
  "[CRX] Vnímání (pohotovost)"
  "Nastavit vnímání v pohotovosti postavy AI. Poznámka: Vyšší = lepší detekce. Používáno při zjištění přítomnosti nepřítele. Vanilla = 2.5 | CRX = 3."
  "[CRX] Vnímání (ohrožení)"
  "Nastavit ohrožené vnímání postavy AI. Poznámka: Vyšší = lepší detekce. Používáno v boji. Vanilla = 0.4 | CRX = 3."
  "[CRX] Modifikátor vnímání"
  "Nastavit modifikátor vnímání postavy AI. Poznámka: Modifikátor se aplikuje na všechna nastavení vnímání."
  "[CRX] Chyba přesnosti míření"
  "Nastavit/získat chybu přesnosti míření postavy AI. Poznámka: Skutečná hodnota na základě hodnosti/dovednosti (0.50-2.00). Nesynchronizováno přes globální nastavení."
  "[CRX] Modifikátor chyby míření"
  "Nastavit modifikátor chyby míření postavy AI. Poznámka: Vyšší kladná hodnota = horší přesnost. Základní hodnota: Vanilla = 1.0 | CRX = Na základě hodnosti 0.50-2.00."
  "[CRX] Držet pozici"
  "Nastavte \"Ano\" pro udržení postavy AI na aktuální pozici. Může reagovat na nebezpečí, ale vždy se vrátí na pozici."
  "[CRX] Poloměr držení pozice"
  "Nastavit poloměr (v metrech), ve kterém se postava AI může pohybovat při držení pozice."
  "[CRX] Aktualizovat pozici"
  "Klikněte pro aktualizaci pozice držení na aktuální pozici."
  "Aktualizovat"
  "[CRX] Šance útěku"
