  "전투 중 AI 그룹의 이동 허용 확률(%)을 설정합니다."
  "[CRX] 전투 엄폐 확률"
  "전투 중 AI 그룹의 엄폐물 사용 확률(%)을 설정합니다."
  "[CRX] 전투 행동 유형"
  "AI 그룹의 전투 행동을 설정합니다. 중요: 참호 모드를 직접 설정하지 마세요. 참고: CQB = 매우 작은 보폭으로 적에 접근. 시가전 = 건물 내 소보폭 이동. 방어 = 적과 안전 거리 유지. 공격 = 적에 근접 돌격 가능."
