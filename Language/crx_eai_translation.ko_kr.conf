  "[CRX] 대형"
  "선택한 AI 그룹의 대형을 설정합니다. 참고: 전투 중에는 '전투 이동 유형'이 '그룹' 또는 '화력조'로 설정된 경우에만 선택한 대형이 사용됩니다."
