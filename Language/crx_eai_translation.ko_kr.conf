  "자율"
  "[CRX] 대형 간격"
  "선택한 AI 그룹의 대형 간격을 설정합니다. 참고: 1.0(기본값)이면 전투 중 위협 상태에 따라 자동 조정됩니다. 1.0이 아닌 값(예: 1.1)으로 설정하면 자동 조정이 비활성화됩니다. 음수 값은 대형 방향을 반전시킵니다."
  "%1 배율"
  "[CRX] 원위치 복귀 방식"
  "AI 그룹의 원위치 복귀 방식을 선택합니다. 참고: 안 함 = 바닐라 | 항상 = 모든 임무 완료 후 항상 복귀 | 공격 후 = 전투 참여 후에만 복귀 | 정찰 후 = 전투 없이 정찰 완료 후에만 복귀."
