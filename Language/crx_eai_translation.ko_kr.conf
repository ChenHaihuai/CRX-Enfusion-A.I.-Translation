  "[CRX] 전투 거리 보정값"
  "AI 그룹의 전투 거리 보정값(미터)을 설정합니다. 참고: 보정값으로 근거리/중거리 전투 범위를 조정합니다. 전투 범위는 AI 무기 유형에 따라 결정됩니다. 대략적 범위: 근거리 약 50m | 중거리 약 50-150m."
  "[CRX] 엄폐 체류 시간 보정값"
  "AI 그룹의 엄폐 체류 시간 보정값(초)을 설정합니다. 참고: 음수 값은 현재 엄폐 위치 체류 시간을 줄여 새 엄폐물 탐색을 앞당깁니다."
  "[CRX] 다음 위치 이동 지연 보정값"
  "AI 그룹이 현재 위치에서 다음 위치로 이동하기까지의 지연 보정값(초)을 설정합니다. 참고: 음수 값 = 더 빠른 이동."
  "[CRX] 엄폐 중 동적 엄폐물 탐색 확률"
  "엄폐 중 AI 그룹이 새 엄폐물을 탐색하는 확률을 설정합니다. 참고: 0%로 설정하면 AI가 매우 정적이 되어 엄폐물 간 이동을 하지 않습니다."
