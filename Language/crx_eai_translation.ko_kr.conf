  "[CRX] 총성 반응 거리"
  "AI 그룹이 총성에 반응할 수 있는 거리(미터)를 설정합니다."
  "[CRX] 소음기 총성 가청 거리"
  "AI 그룹이 소음기 총성을 들을 수 있는 거리(미터)를 설정합니다."
  "[CRX] 정찰"
  "선택한 AI 그룹의 정찰 허용 여부를 설정합니다."
  "[CRX] 정찰 반경"
  "AI 그룹이 목표 지점을 정찰하는 반경(미터)을 설정합니다. 참고: -2 = 바닐라 정찰 반경 | -1 = CRX 정찰 반경(위협 상태와 적 정보에 따라 결정)."
  "[CRX] 정찰 지속 시간"
  "AI 그룹의 정찰 허용 시간(초)을 설정합니다. 참고: -1 = 바닐라 정찰 시간."
  "[CRX] 정찰 시 건물 수색"
  "정찰 중 AI 그룹의 건물 수색 허용 여부를 설정합니다."
  "[CRX] 제압"
  "선택한 AI 그룹의 제압 사격 허용 여부를 설정합니다."
  "[CRX] 제압 지속 시간"
  "AI 그룹의 제압 사격 허용 시간(초)을 설정합니다. 참고: -1 = 바닐라 제압 시간."
  "[CRX] 제압 시 탄창 소모 확률"
  "제압 사격 시 AI 그룹의 탄창 소모 확률을 설정합니다. 100% = 바닐라 | 0% = 제압 시 탄창 소모 없음."
  "[CRX] 제압 시 로켓 탄약 보유 임계값"
  "차량 목표를 위해 보유할 로켓 탄약 수를 설정합니다. 참고: 5로 설정하면 비차량 목표에 대한 로켓 발사를 완전히 방지합니다."
  "[CRX] 로켓 발사기 사용 대기 시간"
  "비차량 목표에 로켓을 사용한 후, 다시 비차량 목표에 로켓을 사용할 수 없는 대기 시간(초)을 설정합니다."
  "[CRX] 전투 모드"
  "AI 그룹의 전투 모드를 설정합니다. 참고: 빨강 = 매우 공격적인 돌격 행동(빨강 + 공격적 이동이 가장 공격적인 조합). 노랑 = 공격적이지만 제압 기반 이동. 흰색 = 엄폐물 간 이동."
  "빨강"
  "노랑"
  "초록"
  "흰색"
