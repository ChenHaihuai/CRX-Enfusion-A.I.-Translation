 Texts {
  "[CRX] Haltung"
  "Haltung der ausgewählten KI-Gruppe festlegen."
  "STEHEN"
  "HOCKEN"
  "LIEGEN"
  "AUTO"
  "[CRX] Formation"
  "Formation der ausgewählten KI-Gruppe festlegen. Hinweis: Im Kampf wird die gewählte Formation nur verwendet, wenn der \"Kampfbewegungstyp\" auf \"GRUPPE\" oder \"FEUERTEAM\" eingestellt ist."
  "V-Formation"
  "Linie"
  "Keil"
  "Kolonne"
  "Feuerteam"
  "Raute"
  "Staffel links"
  "Staffel rechts"
  "Versetzte Kolonne"
  "Autonom"
  "[CRX] Formationsgröße"
  "Formationsgröße der ausgewählten KI-Gruppe festlegen. Hinweis: Bei 1.0 (Standard) passt die Gruppe die Größe im Kampf automatisch an. Ein anderer Wert als 1.0 (z.B. 1.1) deaktiviert die automatische Anpassung. Negative Werte kehren die Ausrichtung um."
  "%1 Skalierung"
  "[CRX] Rückkehr-Positionstyp"
  "Rückkehr-Positionstyp der KI-Gruppe wählen. Hinweis: Nie = Vanilla | Immer = Rückkehr nach allen Aufgaben | Angriff = Rückkehr nur nach Kampf | Erkundung = Rückkehr nur nach kampfloser Erkundung."
  "Nie"
  "Immer"
  "Angriff"
  "Erkundung"
  "%1 Meter"
  "%1 Meter"
  "%1 Sekunden"
  "%1%"
  "%1 Modifikator"
  "%1 km/h"
  "%1 Raketen-Schwellenwert"
  "%1% Chance"
  "[CRX] Schussreaktionsdistanz"
  "Schussreaktionsdistanz (in Metern) der KI-Gruppe festlegen."
  "[CRX] Hörweite unterdrückter Waffen"
  "Hörweite (in Metern) für unterdrückte Schüsse der KI-Gruppe festlegen."
  "[CRX] Erkundung"
  "Erkundung der ausgewählten KI-Gruppe erlauben oder nicht."
  "[CRX] Erkundungsradius"
  "Erkundungsradius (in Metern) der KI-Gruppe festlegen. Hinweis: -2 = Vanilla-Radius | -1 = CRX-Radius (basierend auf Bedrohungslage und Feindwissen)."
  "[CRX] Erkundungsdauer"
  "Erkundungsdauer (in Sekunden) der KI-Gruppe festlegen. Hinweis: -1 = Vanilla-Dauer."
  "[CRX] Gebäudedurchsuchung bei Erkundung"
  "Gebäudedurchsuchung während der Erkundung erlauben oder nicht."
  "[CRX] Unterdrückung"
  "Unterdrückungsfeuer der ausgewählten KI-Gruppe erlauben oder nicht."
  "[CRX] Unterdrückungsdauer"
  "Unterdrückungsdauer (in Sekunden) der KI-Gruppe festlegen. Hinweis: -1 = Vanilla-Dauer."
  "[CRX] Magazinverbrauchschance bei Unterdrückung"
  "Magazinverbrauchschance bei Unterdrückung festlegen. 100% = Vanilla | 0% = Kein Verbrauch bei Unterdrückung."
  "[CRX] Raketenwerfer-Munitionsschwelle bei Unterdrückung"
  "Anzahl der Raketen festlegen, die für Fahrzeugziele aufbewahrt werden. Hinweis: 5 verhindert Raketenbeschuss auf Nicht-Fahrzeugziele vollständig."
  "[CRX] Raketenwerfer-Abklingzeit"
  "Abklingzeit (in Sekunden) festlegen, in der die KI-Gruppe keine Raketen gegen Nicht-Fahrzeugziele einsetzen darf."
  "[CRX] Kampfmodus"
  "Kampfmodus der KI-Gruppe festlegen. Hinweis: Rot = Sehr aggressives Vorrücken (Rot + Offensiv = aggressivste Kombination). Gelb = Aggressiv, aber Bewegung basiert auf Unterdrückung. Weiß = Deckung-zu-Deckung-Bewegung."
  "Rot"
  "Gelb"
  "Grün"
  "Weiß"
  "[CRX] Kampfbewegungschance"
  "Kampfbewegungschance (in Prozent) der KI-Gruppe festlegen."
  "[CRX] Kampfdeckungschance"
  "Deckungschance (in Prozent) der KI-Gruppe im Kampf festlegen."
  "[CRX] Kampfverhaltenstyp"
  "Kampfverhalten der KI-Gruppe festlegen. WICHTIG: Graben-Modus nicht manuell einstellen. Hinweis: Nahkampf = Sehr kleine Schritte nah am Feind. Urban = Kleine Schritte in Gebäuden. Defensiv = Sicherheitsabstand halten. Offensiv = Nahes Vorrücken zum Feind."
  "Nahkampf"
  "Urban"
  "Graben"
  "Standard"
  "Defensiv"
  "Offensiv"
  "Mechanisiert"
  "[CRX] Kampfbewegungstyp"
  "Kampfbewegungstyp der KI-Gruppe festlegen."
  "Gruppe"
  "Einzeln"
  "[CRX] Kampfdistanz-Modifikator"
  "Kampfdistanz-Modifikator (in Metern) der KI-Gruppe festlegen. Hinweis: Modifiziert Nah-/Mitteldistanz. Distanzen hängen vom Waffentyp ab. Ungefähr: Nah ~50m | Mittel ~50-150m."
  "[CRX] Deckungszeit-Modifikator"
  "Deckungszeit-Modifikator (in Sekunden) der KI-Gruppe festlegen. Hinweis: Negative Werte verkürzen die Deckungszeit und beschleunigen die Suche nach neuer Deckung."
  "[CRX] Bewegungsverzögerung-Modifikator"
  "Verzögerungsmodifikator (in Sekunden) vor der Bewegung zur nächsten Position festlegen. Hinweis: Negative Werte = schnellere Bewegung."
  "[CRX] Dynamische Deckungssuche-Chance"
  "Chance festlegen, mit der die KI-Gruppe aus der Deckung heraus neue Deckung sucht. Hinweis: 0% macht die Gruppe sehr statisch ohne Deckung-zu-Deckung-Bewegung."
  "[CRX] Haltung"
  "Haltung des KI-Charakters festlegen."
  "[CRX] Rang"
  "Rang des ausgewählten KI-Charakters festlegen."
  "Gefreiter"
  "Unteroffizier"
  "Feldwebel"
  "Leutnant"
  "Hauptmann"
  "[CRX] Rangtyp"
  "Rangtyp des ausgewählten KI-Charakters festlegen."
  "CRX"
  "Vanilla"
  "[CRX] Nachbewaffnungstyp"
  "Nachbewaffnungstyp des KI-Charakters festlegen. Hinweis: Keine = Keine Nachbewaffnung | Standard = Feind- und Verbündeten-Waffen | Fraktion = Nur Verbündeten-Waffen | Magazine = Nur gleicher Magazintyp."
  "Keine (Deaktiviert)"
  "Standard (Waffen und Magazine von Feinden und Verbündeten)"
  "Fraktion (Nur Waffen und Magazine der eigenen Fraktion)"
  "Magazine (Nur mit Waffentyp kompatible)"
  "[CRX] Waffe erhoben"
  "Waffenhaltung des KI-Charakters festlegen. Hinweis: Nicht über globale Einstellungen synchronisiert. WICHTIG! \"Waffe erhoben > Erheben\" und \"Bewegungstyp > Sprint\" nicht gleichzeitig verwenden! Dies kann Animationen stören."
  "Erheben"
  "Senken"
  "[CRX] Bewegungstyp"
  "Bewegungstyp des KI-Charakters festlegen. Hinweis: Nicht über globale Einstellungen synchronisiert. WICHTIG! \"Waffe erhoben > Erheben\" und \"Bewegungstyp > Sprint\" nicht gleichzeitig verwenden!"
  "Ruhend"
  "Gehen"
  "Laufen"
  "Sprint"
  "[CRX] Wahrnehmung (sicher)"
  "Sichere Wahrnehmung des KI-Charakters festlegen. Hinweis: Höherer Wert = bessere Erkennung. Wird im Ruhezustand verwendet. Vanilla = 1 | CRX = 1."
  "[CRX] Wahrnehmung (wachsam)"
  "Wachsame Wahrnehmung des KI-Charakters festlegen. Hinweis: Höher = bessere Erkennung. Wird ohne Feind aber bei Gefahrenbewusstsein verwendet. Vanilla = 2.5 | CRX = 3."
  "[CRX] Wahrnehmung (alarmiert)"
  "Alarmierte Wahrnehmung des KI-Charakters festlegen. Hinweis: Höher = bessere Erkennung. Wird bei erkannter Feindpräsenz verwendet. Vanilla = 2.5 | CRX = 3."
  "[CRX] Wahrnehmung (bedroht)"
  "Bedrohte Wahrnehmung des KI-Charakters festlegen. Hinweis: Höher = bessere Erkennung. Wird im Kampf verwendet. Vanilla = 0.4 | CRX = 3."
  "[CRX] Wahrnehmungs-Modifikator"
  "Wahrnehmungs-Modifikator des KI-Charakters festlegen. Hinweis: Der Modifikator wird auf alle Wahrnehmungseinstellungen angewendet."
  "[CRX] Zielgenauigkeitsfehler"
  "Zielgenauigkeitsfehler des KI-Charakters festlegen/abrufen. Hinweis: Tatsächlicher Wert basierend auf Rang/Fähigkeit (0.50-2.00). Nicht über globale Einstellungen synchronisiert."
  "[CRX] Zielgenauigkeitsfehler-Modifikator"
  "Zielgenauigkeitsfehler-Modifikator des KI-Charakters festlegen. Hinweis: Höherer positiver Wert = schlechtere Genauigkeit. Basiswert: Vanilla = 1.0 | CRX = Rangbasiert 0.50-2.00."
  "[CRX] Position halten"
  "Auf \"Ja\" setzen, um den KI-Charakter an seiner Position zu halten. Er kann auf Gefahren reagieren, kehrt aber immer zur Position zurück."
  "[CRX] Positionshaltungsradius"
  "Radius (in Metern) festlegen, in dem sich der KI-Charakter beim Halten der Position bewegen darf."
  "[CRX] Position aktualisieren"
  "Klicken, um die Halteposition auf die aktuelle Position zu aktualisieren."
  "Aktualisieren"
  "[CRX] Fluchtchance"
  "Fluchtchance des KI-Charakters bei Übermacht festlegen. Hinweis: Über 50% = sehr schnelle Flucht. 100% = fast sofortige Flucht."
  "[CRX] Ruhende Beobachtung"
  "Beobachtung (Umschauen) des KI-Charakters im Ruhezustand (außerhalb des Kampfes) erlauben oder nicht."
  "[CRX] Taschenlampenstatus"
  "Taschenlampenstatus des KI-Charakters festlegen."
  "Ein"
  "Aus"
  "[CRX] Simulationsstatus"
  "Simulationsstatus des KI-Charakters festlegen. Hinweis: Bei \"AUTONOM\" steuert die Engine die Simulation automatisch basierend auf LOD (Spielerentfernung)."
  "[CRX] Feuermodus"
  "Feuermodus des KI-Charakters festlegen."
  "Halten"
  "Einzelschuss"
  "Feuerstoß"
  "Unterdrückend"
  "[CRX] Im Fahrzeug bleiben erzwingen"
  "KI-Charakter zwingen, im zugewiesenen Fahrzeug zu bleiben."
  "[CRX] Gefahrenreaktionschance"
  "Gefahrenreaktionschance festlegen. Hinweis: Gefahrenereignisse sind \"Schaden erhalten\" und \"Projektiltreffer\"."
  "[CRX] Waffensteuerung deaktivieren"
  "Bei \"Ja\" kann der KI-Charakter seine Waffe nicht benutzen."
  "[CRX] Bewegungssteuerung deaktivieren"
