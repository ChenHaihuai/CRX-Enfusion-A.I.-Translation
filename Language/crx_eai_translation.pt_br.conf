 Texts {
  "[CRX] Postura"
  "Definir a postura do grupo de IA selecionado."
  "EM PÉ"
  "AGACHADO"
  "DEITADO"
  "AUTO"
  "[CRX] Formação"
  "Definir a formação do grupo de IA selecionado. Nota: Durante o combate, a formação selecionada só será usada se o \"Tipo de Movimento de Combate\" estiver definido como \"GRUPO\" ou \"EQUIPE DE FOGO\"."
  "V"
  "Linha"
  "Cunha"
  "Coluna"
  "Equipe de fogo"
  "Diamante"
  "Escalão esquerdo"
  "Escalão direito"
  "Coluna escalonada"
  "Autônomo"
  "[CRX] Escala de formação"
  "Definir a escala de formação do grupo de IA selecionado. Nota: Com 1.0 (padrão), o grupo ajusta automaticamente a escala em combate. Um valor diferente de 1.0 (ex: 1.1) desativa o ajuste automático. Valores negativos invertem a orientação."
  "%1 escala"
  "[CRX] Tipo de retorno à posição"
  "Selecionar o tipo de retorno à posição do grupo de IA. Nota: Nunca = Vanilla | Sempre = Retorno após todas as tarefas | Atacando = Retorno apenas após combate | Investigando = Retorno apenas após investigação sem combate."
  "Nunca"
  "Sempre"
  "Atacando"
  "Investigando"
  "%1 metros"
  "%1 metro"
  "%1 segundos"
  "%1%"
  "%1 modificador"
  "%1 km/h"
  "%1 limite de foguetes"
  "%1% chance"
  "[CRX] Distância de reação a disparos"
  "Definir a distância (em metros) na qual o grupo de IA reage a disparos."
  "[CRX] Distância audível de armas suprimidas"
  "Definir a distância (em metros) na qual o grupo de IA pode ouvir disparos suprimidos."
  "[CRX] Investigar"
  "Definir se o grupo de IA selecionado pode investigar."
  "[CRX] Raio de investigação"
  "Definir o raio de investigação (em metros) do grupo de IA. Nota: -2 = Raio vanilla | -1 = Raio CRX (determinado pelo estado de ameaça e conhecimento inimigo)."
  "[CRX] Duração da investigação"
  "Definir a duração da investigação (em segundos) do grupo de IA. Nota: -1 = Duração vanilla."
  "[CRX] Busca em edifícios na investigação"
  "Definir se o grupo de IA pode buscar em edifícios durante a investigação."
  "[CRX] Supressão"
  "Definir se o grupo de IA selecionado pode realizar supressão."
  "[CRX] Duração da supressão"
  "Definir a duração da supressão (em segundos) do grupo de IA. Nota: -1 = Duração vanilla."
  "[CRX] Chance de consumo de carregadores em supressão"
  "Definir a chance de consumo de carregadores em supressão. 100% = Vanilla | 0% = Sem consumo em supressão."
  "[CRX] Limite de munição de lança-foguetes em supressão"
  "Definir a quantidade de foguetes a reservar para veículos. Nota: 5 impede completamente o disparo de foguetes contra alvos não veiculares."
  "[CRX] Tempo de espera do lança-foguetes"
  "Definir o tempo de espera (em segundos) para impedir o uso de lança-foguetes contra alvos não veiculares após tal ataque."
  "[CRX] Modo de combate"
  "Definir o modo de combate do grupo de IA. Nota: Vermelho = Comportamento muito agressivo (Vermelho + Ofensivo = combinação mais agressiva). Amarelo = Agressivo mas movimento baseado em supressão. Branco = Movimento de cobertura em cobertura."
  "Vermelho"
  "Amarelo"
  "Verde"
  "Branco"
  "[CRX] Chance de movimento em combate"
  "Definir a chance (em porcentagem) de movimento do grupo de IA em combate."
  "[CRX] Chance de uso de cobertura"
  "Definir a chance (em porcentagem) de uso de cobertura do grupo de IA em combate."
  "[CRX] Tipo de comportamento de combate"
  "Definir o comportamento de combate do grupo de IA. IMPORTANTE: Não configurar Trincheira manualmente. Nota: CQB = Passos muito pequenos perto do inimigo. Urbano = Passos pequenos em edifícios. Defensivo = Manter distância segura. Ofensivo = Avanço próximo ao inimigo."
  "CQB"
  "Urbano"
  "Trincheira"
  "Padrão"
  "Defensivo"
  "Ofensivo"
  "Mecanizado"
  "[CRX] Tipo de movimento de combate"
  "Definir o tipo de movimento do grupo de IA em combate."
  "Grupo"
  "Individual"
  "[CRX] Modificador de distância de combate"
  "Definir o modificador de distância de combate (em metros) do grupo de IA. Nota: Modifica os alcances de combate (curto/médio). Os alcances dependem do tipo de arma. Aproximadamente: Curto ~50m | Médio ~50-150m."
  "[CRX] Modificador de duração em cobertura"
  "Definir o modificador de duração em cobertura (em segundos) do grupo de IA. Nota: Valores negativos reduzem o tempo em cobertura e aceleram a busca por nova posição."
  "[CRX] Modificador de atraso de movimento"
  "Definir o modificador de atraso (em segundos) antes de mover para a próxima posição. Nota: Valor negativo = movimento mais rápido."
  "[CRX] Chance de busca dinâmica de cobertura"
  "Definir a chance de busca de nova cobertura estando em cobertura. Nota: 0% torna o grupo muito estático sem movimento de cobertura em cobertura."
  "[CRX] Postura"
  "Definir a postura do personagem de IA."
  "[CRX] Patente"
  "Definir a patente do personagem de IA selecionado."
  "Soldado"
  "Cabo"
  "Sargento"
  "Tenente"
  "Capitão"
  "[CRX] Tipo de patente"
  "Definir o tipo de patente do personagem de IA selecionado."
  "CRX"
  "Vanilla"
  "[CRX] Tipo de rearmamento"
  "Definir o tipo de rearmamento do personagem de IA. Nota: Nenhum = Sem rearmamento | Padrão = Armas e carregadores inimigos e aliados | Facção = Apenas armas aliadas | Carregadores = Apenas carregadores do mesmo tipo."
  "Nenhum (Desativado)"
  "Padrão (Armas e carregadores inimigos e aliados)"
  "Facção (Apenas armas e carregadores da própria facção)"
  "Carregadores (Apenas compatíveis com o tipo de arma)"
  "[CRX] Arma levantada"
  "Definir o estado de arma levantada do personagem de IA. Nota: Não sincronizado via configurações globais. IMPORTANTE! Não use simultaneamente \"Arma levantada > Levantar\" e \"Tipo de movimento > Sprint\"! Pode causar problemas de animação."
  "Levantar"
  "Abaixar"
  "[CRX] Tipo de movimento"
  "Definir o tipo de movimento do personagem de IA. Nota: Não sincronizado via configurações globais. IMPORTANTE! Não use simultaneamente \"Arma levantada > Levantar\" e \"Tipo de movimento > Sprint\"!"
  "Inativo"
  "Caminhar"
  "Correr"
  "Sprint"
  "[CRX] Percepção segura"
  "Definir a percepção segura do personagem de IA. Nota: Valor mais alto = melhor detecção. Usada em repouso. Vanilla = 1 | CRX = 1."
  "[CRX] Percepção vigilante"
  "Definir a percepção vigilante do personagem de IA. Nota: Valor mais alto = melhor detecção. Usada sem inimigo mas ciente do perigo. Vanilla = 2.5 | CRX = 3."
  "[CRX] Percepção em alerta"
  "Definir a percepção em alerta do personagem de IA. Nota: Valor mais alto = melhor detecção. Usada quando o inimigo é detectado. Vanilla = 2.5 | CRX = 3."
  "[CRX] Percepção ameaçada"
  "Definir a percepção ameaçada do personagem de IA. Nota: Valor mais alto = melhor detecção. Usada em combate. Vanilla = 0.4 | CRX = 3."
  "[CRX] Modificador de percepção"
  "Definir o modificador de percepção do personagem de IA. Nota: O modificador se aplica a todas as configurações de percepção."
  "[CRX] Erro de precisão de mira"
  "Definir/obter o erro de precisão de mira do personagem de IA. Nota: Valor real baseado em patente/habilidade (0.50-2.00). Não sincronizado via configurações globais."
  "[CRX] Modificador de erro de precisão"
  "Definir o modificador de erro de precisão do personagem de IA. Nota: Valor positivo mais alto = pior precisão. Valor base: Vanilla = 1.0 | CRX = Baseado em patente 0.50-2.00."
  "[CRX] Manter posição"
  "Definir \"Sim\" para manter o personagem de IA na posição atual. Poderá reagir a perigos mas sempre retornará à posição."
  "[CRX] Raio de manutenção de posição"
  "Definir o raio (em metros) dentro do qual o personagem de IA pode se mover enquanto mantém posição."
  "[CRX] Atualizar posição"
  "Clique para atualizar a posição de manutenção com a posição atual."
  "Atualizar"
  "[CRX] Chance de fuga"
  "Definir a chance de fuga do personagem de IA contra inimigos superiores. Nota: Acima de 50% = fuga muito rápida. 100% = fuga quase instantânea."
  "[CRX] Observador inativo"
  "Definir se o personagem de IA pode observar (olhar ao redor) em estado inativo (fora de combate)."
  "[CRX] Estado da lanterna"
  "Definir o estado da lanterna do personagem de IA."
  "Ligado"
  "Desligado"
  "[CRX] Estado de simulação"
  "Definir o estado de simulação do personagem de IA. Nota: No modo \"AUTÔNOMO\", o motor gerencia automaticamente a simulação com base no LOD (distância do jogador)."
  "[CRX] Modo de disparo"
  "Definir o modo de disparo do personagem de IA."
  "Reter"
  "Semiautomático"
  "Rajada"
  "Supressivo"
  "[CRX] Forçar permanência no veículo"
  "Forçar o personagem de IA a permanecer no veículo designado."
  "[CRX] Chance de reação ao perigo"
  "Definir a chance de reação a eventos de perigo. Nota: Os eventos são \"Dano recebido\" e \"Impacto de projétil\"."
  "[CRX] Desativar controles de arma"
  "Se \"Sim\", o personagem de IA não poderá usar sua arma."
  "[CRX] Desativar controles de movimento"
  "Se \"Sim\", o personagem de IA não poderá se mover."
  "[CRX] Chance de consumo de carregadores"
  "Definir a chance de consumo de carregadores do personagem de IA. Nota: 0% = munição infinita."
  "[CRX] Modificador de atraso de reação de ataque"
  "Definir o modificador de atraso de ataque do personagem de IA. Atraso da identificação até o disparo. Nota: 0 = Atraso vanilla."
  "[CRX] Substituição de configurações globais"
  "Substituir configurações globais baseadas no grupo de IA selecionado. Nota: TODOS = Aplicar a todos os IA. PRÓXIMO = Apenas novos IA. FACÇÃO = Apenas mesma facção. EXCLUIR = Excluir da substituição."
  "TODOS"
  "PRÓXIMO"
  "FACÇÃO"
