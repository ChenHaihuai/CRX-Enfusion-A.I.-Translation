  "[CRX] Modyfikator opóźnienia reakcji ataku"
  "Ustaw modyfikator opóźnienia ataku postaci AI. Opóźnienie od identyfikacji celu do rozpoczęcia strzelania. Uwaga: 0 = Opóźnienie vanilla."
  "[CRX] Nadpisanie ustawień globalnych"
  "Nadpisz ustawienia globalne na podstawie wybranej grupy AI. Uwaga: WSZYSTKIE = Zastosuj do wszystkich AI. NASTĘPNE = Tylko nowe AI. FRAKCJA = Tylko ta sama frakcja. WYKLUCZ = Wyklucz z nadpisania."
