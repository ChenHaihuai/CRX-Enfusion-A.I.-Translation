  "[CRX] Globalny zasięg słyszalności strzałów z tłumikiem"
  "Ustaw globalny dystans (w metrach), w którym grupy AI mogą słyszeć strzały z tłumikiem."
  "[CRX] Globalna supresja"
  "Ustaw, czy grupy AI mogą globalnie prowadzić ogień zaporowy."
  "[CRX] Globalne dochodzenie"
  "Ustaw, czy grupy AI mogą globalnie prowadzić dochodzenia."
  "[CRX] Globalny tryb walki"
  "Ustaw globalny tryb walki grup AI. Uwaga: Czerwony = Bardzo agresywny. Żółty = Agresywny, ale oparty na supresji. Biały = Ruch od osłony do osłony."
  "[CRX] Globalny typ dozbrajania"
  "Ustaw globalny typ dozbrajania AI. Uwaga: Brak = Bez dozbrajania | Domyślny: Broń wroga i sojusznika | Broń: Tylko sojusznicza | Magazynki: Tylko tego samego typu."
  "[CRX] Globalna percepcja bezpieczna"
  "Ustaw globalną bezpieczną percepcję AI. Uwaga: Wyższa = lepsza detekcja. Używana w stanie bezczynności. Vanilla = 1.0 | CRX = 1.0."
  "[CRX] Globalna percepcja czujna"
  "Ustaw globalną czujną percepcję AI. Uwaga: Wyższa = lepsza detekcja. Używana po wykryciu zagrożenia. Vanilla = 2.5 | CRX = 3.0."
  "[CRX] Globalny modyfikator percepcji"
  "Ustaw globalny modyfikator percepcji AI. Uwaga: Modyfikator zmienia wszystkie ustawienia percepcji."
  "[CRX] Globalny modyfikator błędu celności"
  "Ustaw globalny modyfikator błędu celności AI. Uwaga: Wyższy = gorsza celność. Baza: Vanilla = 1.0 | CRX = wg rangi 0.50 - 2.00."
  "[CRX] Globalna szansa zużycia magazynków"
  "Ustaw szansę zużycia magazynków AI. Uwaga: Przy 0% AI nigdy nie wyczerpie amunicji."
  "[CRX] Globalna szansa dynamicznego szukania osłony w walce"
  "Ustaw globalną szansę szukania nowej osłony przez grupy AI. Uwaga: Niektórzy wolą, aby AI pozostała w konkretnej osłonie."
  "[CRX] Globalny limit czasu obsługi komunikacji"
  "Ustaw limit czasu (w sekundach) komunikacji AI. Uwaga: Wartość będzie losowo zwiększana."
  "[CRX] Globalne warunki pogodowe wpływają na AI"
  "Ustaw, czy warunki pogodowe (mgła/deszcz) wpływają na widzenie/detekcję AI. Uwaga: Tylko ciężkie warunki mają wpływ. Wczesna faza beta."
  "[CRX] Globalne środowisko słabego oświetlenia wpływa na AI"
  "Ustaw, czy słabe oświetlenie (noc) wpływa na widzenie/detekcję AI. Wczesna faza beta."
  "[CRX] Globalny modyfikator środowiska słabego oświetlenia"
  "Ustaw modyfikator słabego oświetlenia dla widzenia/detekcji AI. Uwaga: Wyższy = gorsze widzenie. Używaj małych kroków (0.3 - 0.5)."
  "[CRX] Globalny ruch wpływa na celność AI"
  "Ustaw, czy ruch wpływa na celność AI. Uwaga: Wpływa również na AI w poruszających się pojazdach. Wczesna faza beta."
  "[CRX] Globalne zmiany postrzeganej frakcji wpływają na AI"
  "Ustaw, czy noszenie wrogiego munduru wpływa na percepcję AI. Funkcja waniliowej AI używana przez CRX."
