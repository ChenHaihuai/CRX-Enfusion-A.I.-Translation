 Texts {
  "[CRX] Postawa"
  "Ustaw postawę wybranej grupy AI."
  "STÓJ"
  "KUCNIĘCIE"
  "LEŻENIE"
  "AUTO"
  "[CRX] Formacja"
  "Ustaw formację wybranej grupy AI. Uwaga: Podczas walki wybrana formacja będzie używana tylko wtedy, gdy \"Typ ruchu bojowego\" jest ustawiony na \"GRUPA\" lub \"DRUŻYNA OGNIOWA\"."
  "Szyk V"
  "Linia"
  "Klin"
  "Kolumna"
  "Drużyna ogniowa"
  "Romb"
  "Echelon lewy"
  "Echelon prawy"
  "Kolumna naprzemiennie"
  "Autonomiczny"
  "[CRX] Skala formacji"
  "Ustaw skalę formacji wybranej grupy AI. Uwaga: Przy 1.0 (domyślnie) grupa automatycznie dostosowuje skalę w walce. Wartość inna niż 1.0 (np. 1.1) wyłącza automatyczne dostosowanie. Wartości ujemne odwracają orientację."
  "%1 skala"
  "[CRX] Typ powrotu na pozycję"
  "Wybierz typ powrotu na pozycję grupy AI. Uwaga: Nigdy = Vanilla | Zawsze = Powrót po wszystkich zadaniach | Atak = Powrót tylko po walce | Rozpoznanie = Powrót tylko po rozpoznaniu bez walki."
  "Nigdy"
  "Zawsze"
  "Atak"
  "Rozpoznanie"
  "%1 metrów"
  "%1 metr"
  "%1 sekund"
  "%1%"
  "%1 modyfikator"
  "%1 km/h"
  "%1 próg rakiet"
  "%1% szansa"
  "[CRX] Dystans reakcji na strzały"
  "Ustaw dystans (w metrach), w jakim grupa AI reaguje na strzały."
  "[CRX] Dystans słyszalności broni tłumionej"
  "Ustaw dystans (w metrach), w jakim grupa AI słyszy strzały z broni tłumionej."
  "[CRX] Rozpoznanie"
  "Ustaw, czy wybrana grupa AI może prowadzić rozpoznanie."
  "[CRX] Promień rozpoznania"
  "Ustaw promień rozpoznania (w metrach) grupy AI. Uwaga: -2 = Promień vanilla | -1 = Promień CRX (zależy od stanu zagrożenia i wiedzy o wrogu)."
  "[CRX] Czas trwania rozpoznania"
  "Ustaw czas trwania rozpoznania (w sekundach) grupy AI. Uwaga: -1 = Czas vanilla."
  "[CRX] Przeszukiwanie budynków w rozpoznaniu"
  "Ustaw, czy grupa AI może przeszukiwać budynki podczas rozpoznania."
  "[CRX] Ogień zaporowy"
  "Ustaw, czy wybrana grupa AI może prowadzić ogień zaporowy."
  "[CRX] Czas trwania ognia zaporowego"
  "Ustaw czas trwania ognia zaporowego (w sekundach) grupy AI. Uwaga: -1 = Czas vanilla."
  "[CRX] Szansa zużycia magazynków w ogniu zaporowym"
  "Ustaw szansę zużycia magazynków w ogniu zaporowym. 100% = Vanilla | 0% = Brak zużycia w ogniu zaporowym."
  "[CRX] Próg amunicji wyrzutni rakiet w ogniu zaporowym"
  "Ustaw ilość rakiet do zachowania na cele pojazdowe. Uwaga: 5 całkowicie zapobiega strzelaniu rakietami w cele niepojazdowe."
  "[CRX] Czas odnowienia wyrzutni rakiet"
  "Ustaw czas odnowienia (w sekundach) zakazu użycia wyrzutni rakiet przeciw celom niepojazdowym po takim ataku."
  "[CRX] Tryb walki"
  "Ustaw tryb walki grupy AI. Uwaga: Czerwony = Bardzo agresywne natarcie (Czerwony + Ofensywny = najagresywniejsza kombinacja). Żółty = Agresywny, ale ruch oparty na ogniu zaporowym. Biały = Ruch od osłony do osłony."
  "Czerwony"
  "Żółty"
  "Zielony"
  "Biały"
  "[CRX] Szansa ruchu bojowego"
  "Ustaw szansę (w procentach) ruchu grupy AI w walce."
  "[CRX] Szansa użycia osłony"
  "Ustaw szansę (w procentach) użycia osłony przez grupę AI w walce."
  "[CRX] Typ zachowania bojowego"
  "Ustaw zachowanie bojowe grupy AI. WAŻNE: Nie ustawiaj trybu Okopów ręcznie. Uwaga: CQB = Bardzo małe kroki blisko wroga. Miejski = Małe kroki w budynkach. Defensywny = Utrzymanie bezpiecznego dystansu. Ofensywny = Natarcie blisko wroga."
  "CQB"
  "Miejski"
  "Okopy"
  "Domyślny"
  "Defensywny"
  "Ofensywny"
  "Zmechanizowany"
  "[CRX] Typ ruchu bojowego"
  "Ustaw typ ruchu grupy AI w walce."
  "Grupa"
  "Indywidualny"
  "[CRX] Modyfikator dystansu bojowego"
  "Ustaw modyfikator dystansu bojowego (w metrach) grupy AI. Uwaga: Modyfikuje zasięgi bojowe (bliski/średni). Zasięgi zależą od typu broni. Przybliżone: Bliski ~50m | Średni ~50-150m."
  "[CRX] Modyfikator czasu w osłonie"
  "Ustaw modyfikator czasu w osłonie (w sekundach) grupy AI. Uwaga: Wartości ujemne skracają czas w osłonie i przyspieszają szukanie nowej pozycji."
  "[CRX] Modyfikator opóźnienia ruchu"
  "Ustaw modyfikator opóźnienia (w sekundach) przed ruchem na następną pozycję. Uwaga: Wartość ujemna = szybszy ruch."
  "[CRX] Szansa dynamicznego szukania osłony"
  "Ustaw szansę szukania nowej osłony będąc w osłonie. Uwaga: 0% sprawia, że grupa jest bardzo statyczna bez ruchu od osłony do osłony."
  "[CRX] Postawa"
  "Ustaw postawę postaci AI."
  "[CRX] Stopień"
  "Ustaw stopień wybranej postaci AI."
  "Szeregowy"
  "Kapral"
  "Sierżant"
  "Porucznik"
  "Kapitan"
  "[CRX] Typ stopnia"
  "Ustaw typ stopnia wybranej postaci AI."
  "CRX"
  "Vanilla"
  "[CRX] Typ dozbrojenia"
  "Ustaw typ dozbrojenia postaci AI. Uwaga: Brak = Bez dozbrojenia | Domyślny = Broń i magazynki wrogów i sojuszników | Frakcja = Tylko broń sojuszników | Magazynki = Tylko magazynki tego samego typu."
  "Brak (Wyłączony)"
  "Domyślny (Broń i magazynki wrogów i sojuszników)"
  "Frakcja (Tylko broń i magazynki własnej frakcji)"
  "Magazynki (Tylko kompatybilne z typem broni)"
  "[CRX] Broń podniesiona"
  "Ustaw stan podniesionej broni postaci AI. Uwaga: Nie synchronizowane przez ustawienia globalne. WAŻNE! Nie używaj jednocześnie \"Broń podniesiona > Podnieś\" i \"Typ ruchu > Sprint\"! Może to zepsuć animacje."
  "Podnieś"
  "Opuść"
  "[CRX] Typ ruchu"
  "Ustaw typ ruchu postaci AI. Uwaga: Nie synchronizowane przez ustawienia globalne. WAŻNE! Nie używaj jednocześnie \"Broń podniesiona > Podnieś\" i \"Typ ruchu > Sprint\"!"
  "Bezczynny"
  "Marsz"
  "Bieg"
  "Sprint"
  "[CRX] Percepcja (bezpiecz.)"
  "Ustaw percepcję bezpieczną postaci AI. Uwaga: Wyższa wartość = lepsze wykrywanie. Używana w bezczynności. Vanilla = 1 | CRX = 1."
  "[CRX] Percepcja (czujność)"
  "Ustaw percepcję czujną postaci AI. Uwaga: Wyższa = lepsze wykrywanie. Używana bez wroga, ale ze świadomością zagrożenia. Vanilla = 2.5 | CRX = 3."
  "[CRX] Percepcja (alarm)"
  "Ustaw percepcję alarmową postaci AI. Uwaga: Wyższa = lepsze wykrywanie. Używana gdy wróg jest wykryty. Vanilla = 2.5 | CRX = 3."
  "[CRX] Percepcja (zagrożenie)"
  "Ustaw percepcję zagrożoną postaci AI. Uwaga: Wyższa = lepsze wykrywanie. Używana w walce. Vanilla = 0.4 | CRX = 3."
  "[CRX] Modyfikator percepcji"
  "Ustaw modyfikator percepcji postaci AI. Uwaga: Modyfikator wpływa na wszystkie ustawienia percepcji."
  "[CRX] Błąd celności"
  "Ustaw/pobierz błąd celności postaci AI. Uwaga: Rzeczywista wartość na podstawie stopnia/umiejętności (0.50-2.00). Nie synchronizowane przez ustawienia globalne."
  "[CRX] Modyfikator błędu celności"
  "Ustaw modyfikator błędu celności postaci AI. Uwaga: Wyższa wartość dodatnia = gorsza celność. Wartość bazowa: Vanilla = 1.0 | CRX = Na podstawie stopnia 0.50-2.00."
  "[CRX] Utrzymaj pozycję"
  "Ustaw \"Tak\" aby postać AI utrzymywała bieżącą pozycję. Może reagować na zagrożenia, ale zawsze wróci na pozycję."
  "[CRX] Promień utrzymania pozycji"
  "Ustaw promień (w metrach), w jakim postać AI może się poruszać utrzymując pozycję."
  "[CRX] Aktualizuj pozycję"
  "Kliknij, aby zaktualizować pozycję utrzymania do bieżącej pozycji."
  "Aktualizuj"
  "[CRX] Szansa ucieczki"
  "Ustaw szansę ucieczki postaci AI przy przewadze wroga. Uwaga: Powyżej 50% = bardzo szybka ucieczka. 100% = niemal natychmiastowa ucieczka."
  "[CRX] Obserwacja w bezczynności"
  "Ustaw, czy postać AI może obserwować (rozglądać się) w stanie bezczynności (poza walką)."
  "[CRX] Stan latarki"
  "Ustaw stan latarki postaci AI."
  "Włączony"
  "Wyłączony"
  "[CRX] Stan symulacji"
  "Ustaw stan symulacji postaci AI. Uwaga: W trybie \"AUTONOMICZNYM\" silnik automatycznie zarządza symulacją na podstawie LOD (odległości od gracza)."
  "[CRX] Tryb ognia"
  "Ustaw tryb ognia postaci AI."
  "Wstrzymaj"
